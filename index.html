<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Basics Product Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --sand:#e8ddd0;--sand-lt:#f5f0ea;--sand-dk:#c8b89e;
  --bark:#8b7355;--bark-dk:#6e5c42;--bark-lt:#b09070;
  --ink:#2a2420;--mist:#faf8f5;--white:#fff;
  --border:#e5e0d8;--amber:#c97c35;--red:#b84040;
}

body{font-family:'DM Sans',sans-serif;background:var(--mist);color:var(--ink);font-size:14px;line-height:1.5}

/* ── HEADER ── */
.header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;transition:padding .25s}
.header-inner{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem;display:grid;grid-template-columns:160px 1fr auto;gap:2rem;align-items:center}
.header-logo{height:80px;width:auto;object-fit:contain;display:block;transition:height .25s}
.header-info{display:flex;flex-direction:column;gap:.3rem}
.header-info p{color:#888;font-size:.82rem;line-height:1.5}
.header-info .bundle-note{color:var(--bark);font-weight:600;font-size:.82rem}

/* minimized */
.header.mini .header-inner{padding:.55rem 1.5rem}
.header.mini .header-logo{height:34px}
.header.mini .header-info{display:none}

/* ── FILTER SIDEBAR (desktop) ── */
.layout{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:200px 1fr;gap:1.5rem;padding:1.5rem}
.filter-sidebar{position:sticky;top:72px;height:fit-content;display:flex;flex-direction:column;gap:1.25rem}
.filter-group{}
.filter-group-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:.5rem}
.filter-pill{display:block;width:100%;text-align:left;padding:.38rem .7rem;border:1px solid var(--border);border-radius:5px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:.78rem;color:#777;cursor:pointer;transition:all .12s;margin-bottom:.28rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-pill:hover{border-color:var(--bark);color:var(--bark)}
.filter-pill.on{background:var(--bark);color:var(--white);border-color:var(--bark);font-weight:500}
.filter-divider{height:1px;background:var(--border);margin:.25rem 0 .75rem}

/* ── MOBILE FILTER BAR ── */
.mobile-filter-bar{display:none;padding:.5rem 1rem;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:.4rem;flex-shrink:0}
.mobile-filter-bar::-webkit-scrollbar{display:none}
.mobile-chip{padding:.3rem .7rem;border:1px solid var(--border);border-radius:20px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:.72rem;color:#888;cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.mobile-chip:hover{border-color:var(--bark);color:var(--bark)}
.mobile-chip.on{background:var(--bark);color:var(--white);border-color:var(--bark)}
.mobile-filter-toggle{display:none;align-items:center;gap:.5rem;padding:.45rem 1rem;background:var(--white);border-bottom:1px solid var(--border);cursor:pointer;font-size:.78rem;color:#888;font-family:'DM Sans',sans-serif}
.mobile-filter-toggle svg{color:var(--bark)}
.mobile-filter-drawer{display:none;background:var(--white);border-bottom:2px solid var(--border);padding:.75rem 1rem 1rem}
.mobile-filter-drawer.open{display:block}
.mobile-drawer-section{margin-bottom:.75rem}
.mobile-drawer-section:last-child{margin-bottom:0}
.mobile-drawer-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:.4rem}
.mobile-drawer-chips{display:flex;flex-wrap:wrap;gap:.3rem}

/* ── PRODUCT GRID ── */
.grid-wrap{}
.sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;flex-wrap:wrap;gap:.4rem}
.sort-bar-left{font-size:.75rem;color:#aaa}
.sort-bar-left strong{color:var(--bark)}

.grid{column-count:1;column-gap:1rem}
@media(min-width:640px){.grid{column-count:2}}
@media(min-width:1024px){.grid{column-count:3}}

/* ── PRODUCT CARD ── */
.product-card{break-inside:avoid;margin-bottom:1rem;background:var(--white);border-radius:8px;overflow:hidden;border:1px solid #ddd8d0;box-shadow:0 1px 4px rgba(66,55,39,.05);transition:box-shadow .18s,transform .18s}
.product-card:hover{box-shadow:0 4px 16px rgba(66,55,39,.1);transform:translateY(-1px)}
.product-card img{width:100%;height:auto;display:block}
.product-details{padding:.85rem .9rem 1rem}
.product-name{font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:.55rem;line-height:1.35}
.product-price{font-size:1rem;font-weight:500;color:var(--bark);margin-bottom:.2rem}
.bundle-price{font-size:.8rem;color:#aaa;margin-bottom:.5rem}
.product-material{font-size:.75rem;color:#aaa;margin-bottom:.5rem}
.sizes-label{font-size:.72rem;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
.sizes-container{display:flex;flex-wrap:wrap;gap:.3rem}
.size-badge{font-size:.72rem;background:var(--sand-lt);padding:.25rem .55rem;border-radius:4px;color:var(--bark);border:1px solid var(--sand-dk)}
.size-badge.out-of-stock{display:none}
.size-badge.pending-restock{color:var(--amber);background:#fff8f0;border-color:#f5ddb8;font-size:.68rem}
.price-was{text-decoration:line-through;color:#ccc;font-size:1rem;margin-right:.25rem}
.price-now{color:#8e4951;font-weight:600;font-size:1rem}

/* stock indicator dot */
.stock-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.3rem;vertical-align:middle;flex-shrink:0}
.stock-hi{background:#5dab55}
.stock-med{background:var(--amber)}
.stock-lo{background:var(--red)}

.loading-msg{text-align:center;padding:4rem 1rem;color:#ccc;font-size:.85rem}

/* ── FOOTER ── */
.footer{background:var(--white);border-top:1px solid var(--border);margin-top:2rem}
.footer-inner{max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem}
.footer-inner p{color:#bbb;font-size:.72rem}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;padding:1rem}
  .filter-sidebar{display:none}
  .mobile-filter-toggle{display:flex}
}
@media(max-width:640px){
  .header-inner{grid-template-columns:auto 1fr;gap:1rem;padding:1rem}
  .header-logo{height:52px}
  .header-info{display:none}
  .header.mini .header-inner{padding:.5rem 1rem}
  .header.mini .header-logo{height:28px}
}
</style>
</head>

/* ── STATE ── */
let filters = { size:'all', cat:'all', season:'all' };
let catalogProducts = [];
let stockData = {};
let pendingStock = {};

/* ── HELPERS ── */
function getSizeStock(product, label){
  const idx = product.sizes.indexOf(label);
  const cm = product.sizesCm ? product.sizesCm[idx] : SIZE_LABEL_TO_CM[label];
  if(!cm || !product.pids) return null;
  const hasAny = product.pids.some(pid => (pid+'_'+cm) in stockData);
  if(!hasAny) return null;
  return product.pids.reduce((s,pid) => {
    const k = pid+'_'+cm;
    return k in stockData ? s + stockData[k] : s;
  }, 0);
}

function getTotalStock(product){
  // Sum all sizes for this product
  const hasAny = product.sizes.some(label => getSizeStock(product, label) !== null);
  if(!hasAny) return null; // no data yet
  return product.sizes.reduce((s, label) => {
    const st = getSizeStock(product, label);
    return s + (st || 0);
  }, 0);
}

// Infer season from category/material/name — sheet products may have it explicit
function getSeason(product){
  if(product.season) return product.season;
  const name = (product.name||'').toLowerCase();
  const mat  = (product.material||'').toLowerCase();
  if(mat.includes('fleece') || mat.includes('padded') || name.includes('fleece') || name.includes('quilted') || name.includes('padded') || name.includes('knit') || name.includes('sweatshirt') || name.includes('cardigan') || name.includes('sweater'))
    return 'Winter';
  if(name.includes('short') || name.includes('linen') || name.includes('muslin') || name.includes('sleeve shirt') || name.includes('romper') || mat.includes('linen'))
    return 'Summer';
  return 'Spring/Autumn';
}

/* ── MOBILE DRAWER ── */
function toggleMobileDrawer(){
  const drawer = document.getElementById('mobileFilterDrawer');
  const arrow  = document.getElementById('mobileFilterArrow');
  const open   = drawer.classList.toggle('open');
  arrow.style.transform = open ? 'rotate(180deg)' : '';
}

/* ── FILTER WIRING ── */
function buildMobileChips(){
  const sizes = ['all','3-6M','6-12M','12-24M','2T','3T','4T','5T'];
  const cats  = ['all','Tops','Bottoms','Rompers & Overalls','Sets','Outerwear','Cardigans & Knitwear'];
  const seasons = ['all','Summer','Spring/Autumn','Winter'];
  const labels  = {'all':'All','Rompers & Overalls':'Rompers','Cardigans & Knitwear':'Knitwear','Spring/Autumn':'Spring/Autumn'};
  function makeChips(container, vals, filterKey){
    const el = document.getElementById(container);
    el.innerHTML = vals.map(v=>`<button class="mobile-chip${filters[filterKey]===v?' on':''}" data-filter="${filterKey}" data-val="${v}">${labels[v]||v}</button>`).join('');
    el.addEventListener('click', e=>{
      const btn = e.target.closest('.mobile-chip'); if(!btn) return;
      filters[btn.dataset.filter] = btn.dataset.val;
      el.querySelectorAll('.mobile-chip').forEach(b=>b.classList.toggle('on', b===btn));
      syncDesktopFilters();
      renderProducts();
      updateMobileLabel();
    });
  }
  makeChips('mobileSizeChips', sizes, 'size');
  makeChips('mobileCatChips', cats, 'cat');
  makeChips('mobileSeasonChips', seasons, 'season');
}

function syncDesktopFilters(){
  document.querySelectorAll('.filter-pill').forEach(btn=>{
    btn.classList.toggle('on', btn.dataset.val === filters[btn.dataset.filter]);
  });
}

function updateMobileLabel(){
  const active = Object.entries(filters).filter(([,v])=>v!=='all').map(([k,v])=>v);
  document.getElementById('mobileFilterLabel').textContent = active.length
    ? 'Filters: ' + active.join(', ')
    : 'Filter & Sort';
}

// Desktop sidebar clicks
document.getElementById('filterSidebar').addEventListener('click', e=>{
  const btn = e.target.closest('.filter-pill'); if(!btn) return;
  const f = btn.dataset.filter;
  filters[f] = btn.dataset.val;
  document.querySelectorAll(`.filter-pill[data-filter="${f}"]`).forEach(b=>b.classList.toggle('on', b===btn));
  // sync mobile
  document.querySelectorAll(`.mobile-chip[data-filter="${f}"]`).forEach(b=>b.classList.toggle('on', b.dataset.val===filters[f]));
  updateMobileLabel();
  renderProducts();
});

/* ── LOAD FROM SHEET ── */
async function loadFromSheet(){
  try{
    const [prodRes, stockRes, pendingRes] = await Promise.all([
      fetch(SHEET_URL+'?action=read&tab=Products'),
      fetch(SHEET_URL+'?action=read&tab=Stock'),
      fetch(SHEET_URL+'?action=read&tab=Pending')
    ]);
    const prodRows    = await prodRes.json();
    const stockRows   = await stockRes.json();
    const pendingRows = await pendingRes.json();

    stockData = {};
    pendingStock = {};
    stockRows.slice(1).forEach(([key,qty])=>{ stockData[String(key)]=parseInt(qty)||0; });
    if(pendingRows&&pendingRows.length>1){
      pendingRows.slice(1).forEach(([key,qty])=>{ if(key&&parseInt(qty)>0) pendingStock[String(key)]=parseInt(qty); });
    }

    const KNOWN_CM=['130','120','110','100','90','80','70','60'];
    const sheetProducts=[];
    prodRows.slice(1).forEach(row=>{
      const [pid,name,color,hex,sizesRaw,price,bundlePrice,cost,image,material,saleDiscount,category,bin,unit]=row;
      if(!pid||!name) return;
      let raw=String(sizesRaw||'');
      let sizesCm=[];
      if(raw.includes(',')){ sizesCm=raw.split(',').map(s=>s.trim()).filter(Boolean); }
      else if(/^\d+$/.test(raw.replace(/\s/g,''))){
        let rem=raw.replace(/\s/g,'');
        while(rem.length>0){ const m=KNOWN_CM.find(cm=>rem.startsWith(cm)); if(m){sizesCm.push(m);rem=rem.slice(m.length);}else rem=rem.slice(1); }
      } else { sizesCm=raw.split(/\s+/).map(s=>s.trim()).filter(Boolean); }
      const sizesDisplay=sizesCm.map(cm=>CM_TO_LABEL[cm]||cm);
      sheetProducts.push({
        id:parseInt(pid), name:String(name), color:String(color||''),
        price:isNaN(parseFloat(price))?price:parseFloat(price),
        bundlePrice:isNaN(parseFloat(bundlePrice))?bundlePrice:parseFloat(bundlePrice),
        sizes:sizesDisplay, sizesCm, material:String(material||''),
        saleDiscount:parseFloat(saleDiscount)||0,
        category:String(category||'Uncategorized'),
        unit:String(unit||'ea'), image:String(image||''),
        hidden:false
      });
    });

    if(sheetProducts.length>0){
      const grouped={};
      sheetProducts.forEach(p=>{
        if(p.category==='Sold Out'||p.hidden) return;
        if(!grouped[p.name]){
          grouped[p.name]={...p, allSizes:[...p.sizes], allSizesCm:[...p.sizesCm], pids:[p.id]};
        } else {
          p.sizes.forEach((s,i)=>{ if(!grouped[p.name].allSizes.includes(s)){ grouped[p.name].allSizes.push(s); grouped[p.name].allSizesCm.push(p.sizesCm[i]); } });
          grouped[p.name].pids.push(p.id);
        }
      });
      catalogProducts=Object.values(grouped).map(g=>{
        const pairs=g.allSizes.map((s,i)=>({label:s,cm:g.allSizesCm[i]}));
        pairs.sort((a,b)=>CM_ORDER.indexOf(a.cm)-CM_ORDER.indexOf(b.cm));
        return {...g, sizes:pairs.map(p=>p.label), sizesCm:pairs.map(p=>p.cm)};
      });
    } else { useFallback(); }
  } catch(e){ useFallback(); }
  renderProducts();
}

function useFallback(){
  catalogProducts=FALLBACK_PRODUCTS.map(p=>({
    ...p, pids:[p.id],
    sizesCm:p.sizes.map(s=>SIZE_LABEL_TO_CM[s]||null)
  }));
}

/* ── RENDER ── */
function renderProducts(){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';

  let list = catalogProducts.filter(p=>p.sizes&&p.sizes.length>0);

  // ── Size filter ──
  if(filters.size !== 'all'){
    list = list.filter(p=>{
      if(!p.sizes.includes(filters.size)) return false;
      const st = getSizeStock(p, filters.size);
      return st === null || st > 0;
    });
  }

  // ── Hide all-zero-stock products ──
  list = list.filter(p=>{
    const hasData = p.sizes.some(l=>getSizeStock(p,l)!==null);
    if(!hasData) return true;
    return p.sizes.some(l=>{ const s=getSizeStock(p,l); return s===null||s>0; });
  });

  // ── Category filter ──
  if(filters.cat !== 'all'){
    list = list.filter(p=>(p.category||'Uncategorized')===filters.cat);
  }

  // ── Season filter ──
  if(filters.season !== 'all'){
    list = list.filter(p=>getSeason(p)===filters.season);
  }

  // ── Sort: highest total stock first, no-data products go to end ──
  list.sort((a,b)=>{
    const sa = getTotalStock(a);
    const sb = getTotalStock(b);
    if(sa === null && sb === null) return 0;
    if(sa === null) return 1;   // no data → end
    if(sb === null) return -1;
    return sb - sa;             // high stock first
  });

  // Update count bar
  document.getElementById('sortBarLeft').innerHTML =
    `<strong>${list.length}</strong> item${list.length!==1?'s':''} available`
    + (filters.size!=='all'||filters.cat!=='all'||filters.season!=='all'
      ? ` <span style="color:#ccc">·</span> sorted by stock`
      : ` <span style="color:#ccc">·</span> sorted by stock`);

  if(!list.length){
    grid.innerHTML='<div class="loading-msg">No products available with these filters.</div>';
    return;
  }

  list.forEach(product=>{
    const totalSt = getTotalStock(product);
    const stockDotClass = totalSt===null ? '' : totalSt===0 ? 'stock-lo' : totalSt<=3 ? 'stock-med' : 'stock-hi';

    const sizeBadges = product.sizes.map(label=>{
      if(!label) return '';
      const st = getSizeStock(product, label);
      if(st===null) return `<span class="size-badge">${label}</span>`;
      if(st===0){
        const cm = product.sizesCm ? product.sizesCm[product.sizes.indexOf(label)] : SIZE_LABEL_TO_CM[label];
        const isPending = cm && product.pids && product.pids.some(pid=>pendingStock[pid+'_'+cm]);
        return isPending
          ? `<span class="size-badge pending-restock">${label} · Soon</span>`
          : `<span class="size-badge out-of-stock">${label}</span>`;
      }
      return `<span class="size-badge">${label}</span>`;
    }).join('');

    const sale = product.saleDiscount||0;
    const unit = product.unit||'ea';
    const unitLabel = unit==='ea' ? '/ea' : '/set';
    const salePrice = sale>0 ? parseFloat(product.price)-sale : null;
    const priceHtml = sale>0
      ? `<div class="product-price"><span class="price-was">$${product.price}${unitLabel}</span><span class="price-now">$${salePrice.toFixed(2)}${unitLabel}</span></div>`
      : `<div class="product-price">$${product.price}<span style="font-size:.9em;color:var(--bark);margin-left:1px">${unitLabel}</span></div>`;
    const bundleHtml = sale>0 ? '' : `<div class="bundle-price">Bundle: $${product.bundlePrice}${unitLabel}</div>`;

    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
      <div class="product-details">
        <div class="product-name">${product.name}</div>
        ${priceHtml}
        ${bundleHtml}
        ${product.material?`<div class="product-material">${product.material}</div>`:''}
        <div class="sizes-label">
          ${stockDotClass ? `<span class="stock-dot ${stockDotClass}"></span>` : ''}Sizes Available
        </div>
        <div class="sizes-container">${sizeBadges}</div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ── BOOT ── */
buildMobileChips();
loadFromSheet();
