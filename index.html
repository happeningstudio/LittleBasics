<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Basics Product Catalog</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
    background-color: #faf8f5;
}

.container { max-width:1400px; margin:0 auto; padding:0 1rem; }

/* ── HEADER ── */
.header {
    background-color: #fff;
    border-bottom: 1px solid #e5e5e5;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    display: grid;
    grid-template-columns: 160px 1fr 1fr;
    gap: 2rem;
    align-items: center;
}

.header-logo { grid-column:1; height:90px; width:auto; object-fit:contain; display:block; }

.header-left { grid-column:2; display:flex; flex-direction:column; gap:0.4rem; }
.header-left p { color:#666; font-size:0.9rem; line-height:1.4; }
.header-left .bundle-info { font-weight:600; color:#8b7355; }

.header-right { grid-column:3; display:flex; flex-direction:column; justify-content:center; }
.filter-label { font-size:0.875rem; color:#666; margin-bottom:0.75rem; font-weight:600; }
.filter-buttons { display:flex; flex-wrap:wrap; gap:0.5rem; }

.filter-btn {
    padding: 0.5rem 1rem;
    border: 1px solid #d4c5b9;
    background-color: #fff;
    border-radius: 0.5rem;
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.2s;
    color: #5a5a5a;
    flex-shrink: 0;
}
.filter-btn:hover { border-color:#b8a89a; background-color:#fefdfb; }
.filter-btn.active { background-color:#8b7355; color:white; border-color:#8b7355; }

/* ── MINIMIZED ── */
.header.minimized .header-content { padding:0.6rem 1rem; }
.header.minimized .header-logo { height:38px; }
.header.minimized .header-left { display:none; }
.header.minimized .filter-label { display:none; }
.header.minimized .filter-buttons { flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.header.minimized .filter-buttons::-webkit-scrollbar { display:none; }
.header.minimized .filter-btn { padding:0.4rem 0.6rem; font-size:0.8rem; }

/* ── PRODUCT GRID ── */
.product-grid-container { padding:1.5rem 0.5rem; }
.grid { column-count:1; column-gap:1rem; }
@media (min-width:640px)  { .grid { column-count:2; } }
@media (min-width:1024px) { .grid { column-count:3; } }
@media (min-width:1280px) { .grid { column-count:4; } }

/* ── MOBILE ── */
@media (max-width:768px) {
    .header-content { grid-template-columns:1fr; grid-template-rows:auto auto auto; gap:0.75rem; padding:1rem; }
    .header-logo { grid-column:1; grid-row:1; height:60px; justify-self:start; }
    .header-right { grid-column:1; grid-row:2; }
    .header-left { grid-column:1; grid-row:3; }

    .header.minimized .header-content { grid-template-columns:1fr; grid-template-rows:auto auto; gap:0.5rem; padding:0.75rem 1rem; }
    .header.minimized .header-logo { grid-column:1; grid-row:1; height:28px; justify-self:start; }
    .header.minimized .header-right { grid-column:1; grid-row:2; }
    .header.minimized .filter-label { display:block; margin-bottom:0.4rem; }
    .header.minimized .filter-buttons { flex-wrap:wrap; }
    .header.minimized .filter-btn { padding:0.4rem 0.7rem; font-size:0.8rem; }
    .header.minimized .header-left { display:none; }
}

/* ── PRODUCT CARDS ── */
.product-card {
    break-inside: avoid;
    margin-bottom: 1rem;
    background: white;
    border-radius: 0.5rem;
    overflow: hidden;
    border: 1px solid #423727;
    box-shadow: 0 1px 3px 0 rgba(0,0,0,0.04);
    transition: box-shadow 0.2s;
}
.product-card:hover { box-shadow:0 4px 12px rgba(66,55,39,0.12); }

.product-image { width:100%; height:auto; display:block; }

.product-details { padding:1rem 1rem 1.25rem; }
.product-name { font-size:1.05rem; font-weight:600; margin-bottom:0.75rem; color:#221c13; line-height:1.35; }
.product-price { font-size:1.1rem; font-weight:500; color:#423727; margin-bottom:0.3rem; }
.bundle-price { font-size:0.875rem; color:#423727; font-weight:normal; margin-bottom:0.6rem; opacity:0.75; }
.product-material { font-size:0.8rem; color:#423727; margin-bottom:0.6rem; opacity:0.7; }
.sizes-label { font-size:0.8rem; color:#423727; font-weight:500; margin-bottom:0.4rem; opacity:0.8; }

.sizes-container { display:flex; flex-wrap:wrap; gap:0.35rem; }

.size-badge {
    font-size: 0.75rem;
    background-color: #f5f1ed;
    padding: 0.3rem 0.6rem;
    border-radius: 0.25rem;
    color: #423727;
    border: 1px solid #ddd6cc;
}
.size-badge.out-of-stock {
    display: none;
}
.size-badge.pending-restock {
    color: #c97c35;
    background: #fff8f0;
    border-color: #f5ddb8;
    font-size: 0.72rem;
}

/* ── SALE ── */
.sale-badge-card { display: none; }
.price-was {
    text-decoration: line-through;
    color: #bbb;
    font-size: 1.1rem;
    margin-right: 0.3rem;
}
.price-now {
    color: #8e4951;
    font-weight: 500;
    font-size: 1.1rem;
}

/* ── LOADING STATE ── */
.loading-msg {
    text-align: center;
    padding: 4rem 1rem;
    color: #bbb;
    font-size: 0.9rem;
}

/* ── FOOTER ── */
.footer { background-color:#fff; border-top:1px solid #e5e5e5; margin-top:2rem; }
.footer-content { max-width:1400px; margin:0 auto; padding:1.5rem 1rem; }
.footer p { color:#999; font-size:0.75rem; }
    </style>
</head>

// ── STATE ──
let currentSizeFilter = 'all';
let isMinimized = false;
let catalogProducts = [];  // populated from Sheet or fallback
let stockData = {};
let pendingStock = {};        // { "pid_cm": qty }

// ── INIT ──
window.scrollTo(0, 0);
window.addEventListener('load', () => window.scrollTo(0, 0));

// Scroll minimise
const header = document.getElementById('header');
let ticking = false;
window.addEventListener('scroll', () => {
    if (!ticking) {
        window.requestAnimationFrame(() => {
            const s = window.pageYOffset || document.documentElement.scrollTop;
            if (!isMinimized && s > 200) { isMinimized = true;  header.classList.add('minimized'); }
            else if (isMinimized && s < 50) { isMinimized = false; header.classList.remove('minimized'); }
            ticking = false;
        });
        ticking = true;
    }
}, { passive: true });

// Filter buttons
document.getElementById('filterButtons').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentSizeFilter = btn.dataset.size;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderProducts();
});

// ── LOAD FROM SHEET ──
async function loadFromSheet() {
    try {
        // Fetch products and stock in parallel
        const [prodRes, stockRes, pendingRes] = await Promise.all([
            fetch(SHEET_URL + '?action=read&tab=Products'),
            fetch(SHEET_URL + '?action=read&tab=Stock'),
            fetch(SHEET_URL + '?action=read&tab=Pending')
        ]);
        const prodRows    = await prodRes.json();
        const stockRows   = await stockRes.json();
        const pendingRows = await pendingRes.json();

        // Parse stock: rows = [["key","qty"], ["1_70", 3], ...]
        stockData = {};
        pendingStock = {}; // pid_cm keys with pending qty
        stockRows.slice(1).forEach(([key, qty]) => {
            stockData[String(key)] = parseInt(qty) || 0;
        });
        // Parse pending: same key format, marks items on order but not yet received
        if (pendingRows && pendingRows.length > 1) {
            pendingRows.slice(1).forEach(([key, qty]) => {
                if (key && parseInt(qty) > 0) pendingStock[String(key)] = parseInt(qty);
            });
        }

        // Parse products from Sheet
        // Columns: pid, name, color, hex, sizes(comma-sep cm), price, bundlePrice, cost, image, material, saleDiscount, category, bin
        const sheetProducts = [];
        prodRows.slice(1).forEach(row => {
            const [pid, name, color, hex, sizesRaw, price, bundlePrice, cost, image, material, saleDiscount, category, bin] = row;
            if (!pid || !name) return;
            const sizesCm = String(sizesRaw||'').split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
            const sizesDisplay = sizesCm.map(cm => CM_TO_LABEL[cm] || cm);
            sheetProducts.push({
                id: parseInt(pid),
                name: String(name),
                color: String(color||''),
                price: isNaN(parseFloat(price)) ? price : parseFloat(price),
                bundlePrice: isNaN(parseFloat(bundlePrice)) ? bundlePrice : parseFloat(bundlePrice),
                sizes: sizesDisplay,
                sizesCm,
                material: String(material||''),
                saleDiscount: parseFloat(saleDiscount)||0,
                category: String(category||'Uncategorized'),
                image: String(image||'')
            });
        });

        // If we got valid products from the sheet, use them; otherwise fall back
        if (sheetProducts.length > 0) {
            // Group by name — show one card per product name, listing all color variants' sizes combined
            const grouped = {};
            sheetProducts.forEach(p => {
                if (p.category === 'Sold Out') return; // hide sold out from catalog
                if (!grouped[p.name]) {
                    grouped[p.name] = { ...p, allSizes: [...p.sizes], allSizesCm: [...p.sizesCm], pids: [p.id] };
                } else {
                    // Merge sizes from other color variants
                    p.sizes.forEach((s, i) => {
                        if (!grouped[p.name].allSizes.includes(s)) {
                            grouped[p.name].allSizes.push(s);
                            grouped[p.name].allSizesCm.push(p.sizesCm[i]);
                        }
                    });
                    grouped[p.name].pids.push(p.id);
                }
            });
            catalogProducts = Object.values(grouped).map(g => {
                // Sort sizes by cm order
                const CM_ORDER=['60','70','80','90','100','110','120','130'];
                const pairs=g.allSizes.map((s,i)=>({label:s,cm:g.allSizesCm[i]}));
                pairs.sort((a,b)=>CM_ORDER.indexOf(a.cm)-CM_ORDER.indexOf(b.cm));
                return {
                    ...g,
                    sizes: pairs.map(p=>p.label),
                    sizesCm: pairs.map(p=>p.cm),
                };
            });
        } else {
            useFallback();
        }
    } catch (e) {
        useFallback();
    }
    renderProducts();
}

function useFallback() {
    // Use the hardcoded list, convert size labels to cm for stock lookup
    catalogProducts = FALLBACK_PRODUCTS.map(p => ({
        ...p,
        pids: [p.id],
        sizesCm: p.sizes.map(s => SIZE_LABEL_TO_CM[s] || null)
    }));
}

// ── RENDER ──
function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    // Size label filter
    let filtered = currentSizeFilter === 'all'
        ? catalogProducts
        : catalogProducts.filter(p => p.sizes.includes(currentSizeFilter));

    // Skip products with no sizes at all
    filtered = filtered.filter(p => p.sizes && p.sizes.length > 0 && p.sizes.some(s => s));

    // Hide products where ALL sizes are 0 stock (fully sold out)
    filtered = filtered.filter(p => {
        if (!p.sizesCm || !p.pids) return true; // no stock data, show it
        const hasAnyStock = p.sizes.some((label, i) => {
            const cm = p.sizesCm ? p.sizesCm[i] : SIZE_LABEL_TO_CM[label];
            if (!cm) return false;
            const hasKey = p.pids.some(pid => (pid+'_'+cm) in stockData);
            if (!hasKey) return true; // no stock data at all — show
            return p.pids.reduce((sum, pid) => {
                const k = pid+'_'+cm;
                return k in stockData ? sum + stockData[k] : sum;
            }, 0) > 0;
        });
        return hasAnyStock;
    });

    // Shuffle
    filtered = [...filtered].sort(() => Math.random() - 0.5);

    filtered.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';

        // Build size badges with stock awareness
        const sizeBadges = product.sizes.map((label, i) => {
            if (!label) return '';
            const cm = product.sizesCm ? product.sizesCm[i] : SIZE_LABEL_TO_CM[label];
            // Check stock across all pids for this product group
            let totalStock = null;
            if (cm && product.pids) {
                totalStock = product.pids.reduce((sum, pid) => {
                    const k = `${pid}_${cm}`;
                    return k in stockData ? sum + stockData[k] : sum;
                }, 0);
                // If no stock keys found at all, show normally (no data yet)
                const hasAnyKey = product.pids.some(pid => `${pid}_${cm}` in stockData);
                if (!hasAnyKey) totalStock = null;
            }

            if (totalStock === null) {
                return `<span class="size-badge">${label}</span>`;
            } else if (totalStock === 0) {
                // Check if pending restock
                const isPending = cm && product.pids && product.pids.some(pid => pendingStock[pid+'_'+cm]);
                if (isPending) {
                    return `<span class="size-badge pending-restock" title="Coming soon">${label} · Pending Restock</span>`;
                }
                return `<span class="size-badge out-of-stock" title="Out of stock">${label} · Sold Out</span>`;
            } else {
                return `<span class="size-badge">${label}</span>`;
            }
        }).join('');

        const sale = product.saleDiscount || 0;
        const salePrice = sale > 0 ? parseFloat(product.price) - sale : null;
        const priceHtml = sale > 0
            ? `<div class="product-price"><span class="price-was">$${product.price}</span><span class="price-now">$${salePrice.toFixed(2)}</span></div>`
            : `<div class="product-price">$${product.price}</div>`;
        const bundleHtml = sale > 0 ? '' : `<div class="bundle-price">Bundle Price: $${product.bundlePrice}</div>`;

        card.innerHTML = `
            <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
            <div class="product-details">
                <div class="product-name">${product.name}</div>
                ${priceHtml}
                ${bundleHtml}
                ${product.material ? `<div class="product-material">Material: ${product.material}</div>` : ''}
                <div class="sizes-label">Size Available</div>
                <div class="sizes-container">${sizeBadges}</div>
            </div>
        `;
        grid.appendChild(card);
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="loading-msg">No products available in this size right now.</div>';
    }
}

// ── START ──
loadFromSheet();
</script>
