<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Basics — Vendor Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --sand:#e8ddd0;--sand-lt:#f5f0ea;--sand-dk:#c8b89e;
  --bark:#8b7355;--bark-dk:#6e5c42;--bark-lt:#b09070;
  --ink:#2a2420;--mist:#f7f4f1;--white:#fff;
  --border:#e2dbd2;--green:#3d7a52;--red:#b84040;--amber:#c97c35;
  --top:52px;
  --shadow:0 1px 8px rgba(42,36,32,.07);
  --shadow-md:0 4px 20px rgba(42,36,32,.11);
}
body{font-family:'DM Sans',sans-serif;background:var(--mist);color:var(--ink);font-size:13px;line-height:1.5;min-height:100vh}

/* TOPBAR */
.topbar{height:var(--top);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;position:sticky;top:0;z-index:400;gap:1rem}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.topbar-logo{height:28px}
.topbar-divider{width:1px;height:20px;background:var(--border)}
.topbar-title{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--bark)}
.topbar-right{display:flex;align-items:center;gap:.5rem}

/* BUTTONS */
.btn{padding:.32rem .75rem;font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:#666;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--bark);color:var(--bark)}
.btn.primary{background:var(--bark);color:var(--white);border-color:var(--bark)}
.btn.primary:hover{background:var(--bark-dk)}
.btn.danger{color:var(--red);border-color:currentColor}
.btn.danger:hover{background:var(--red);color:var(--white)}
.btn.sm{padding:.22rem .55rem;font-size:.68rem}
.btn.ghost{background:transparent;border-color:transparent;color:#aaa}
.btn.ghost:hover{color:var(--bark);border-color:var(--sand-dk);background:var(--sand-lt)}

/* LAYOUT */
.page{display:grid;grid-template-columns:210px 1fr;height:calc(100vh - var(--top));overflow:hidden}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:.75rem .85rem .5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-head h3{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:.5rem}
.sidebar-list{flex:1;overflow-y:auto;padding:.4rem 0}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:.42rem .85rem;cursor:pointer;font-size:.8rem;font-weight:500;color:#666;border-left:2px solid transparent;transition:all .12s;gap:.4rem}
.sidebar-item:hover{background:var(--sand-lt);color:var(--bark)}
.sidebar-item.active{background:var(--sand-lt);color:var(--bark);border-left-color:var(--bark);font-weight:600}
.sidebar-item-count{font-size:.65rem;color:#bbb;background:var(--mist);padding:.1rem .35rem;border-radius:20px;flex-shrink:0}
.sidebar-item.active .sidebar-item-count{background:var(--sand-dk);color:var(--bark-dk)}
.sidebar-footer{padding:.6rem .85rem;border-top:1px solid var(--border);flex-shrink:0}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:.5rem;padding:.55rem 1rem;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;position:relative;z-index:20}
.search-wrap{position:relative;flex:1;min-width:140px;max-width:240px}
.search-wrap svg{position:absolute;left:.5rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#bbb}
.search-input{width:100%;padding:.32rem .5rem .32rem 1.6rem;border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.75rem;background:var(--mist);color:var(--ink);transition:all .15s}
.search-input:focus{outline:none;border-color:var(--bark);background:var(--white)}
.search-input::placeholder{color:#bbb}

.chip{padding:.22rem .55rem;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:500;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:#999;transition:all .12s;white-space:nowrap;pointer-events:all;position:relative;z-index:21}
.chip:hover{border-color:var(--bark);color:var(--bark)}
.chip.on{background:var(--bark);color:var(--white);border-color:var(--bark)}

/* VIEW TOGGLE */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.vtog{padding:.28rem .5rem;border:none;background:transparent;cursor:pointer;color:#bbb;display:flex;align-items:center;transition:all .12s}
.vtog:hover{background:var(--sand-lt);color:var(--bark)}
.vtog.on{background:var(--bark);color:var(--white)}

.toolbar-meta{font-size:.68rem;color:#bbb;white-space:nowrap;margin-left:auto}

/* CONTENT AREA */
.content-area{flex:1;overflow-y:auto;padding:1rem}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}

/* CARD */
.card{background:var(--white);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s;cursor:pointer;border:1px solid transparent}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--sand-dk)}
.card.is-hidden{opacity:.4}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--sand-lt);display:block}
.card-img-placeholder{width:100%;aspect-ratio:1;background:var(--sand-lt);display:flex;align-items:center;justify-content:center;color:var(--sand-dk);font-size:1.5rem}
.card-body{padding:.5rem .55rem .55rem}
.card-style{font-size:.72rem;font-weight:700;color:var(--ink)}
.card-cat{font-size:.62rem;color:var(--bark-lt);margin-bottom:.2rem}
.card-colors{font-size:.65rem;color:#888;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-price{font-size:.78rem;font-weight:600;color:var(--bark);margin-top:.25rem}
.card-season{display:inline-block;font-size:.58rem;font-weight:600;padding:.08rem .3rem;border-radius:3px;background:var(--sand-lt);color:var(--bark);margin-top:.2rem;text-transform:uppercase;letter-spacing:.04em}

/* TABLE VIEW */
.vendor-table{width:100%;border-collapse:collapse;min-width:800px}
.vendor-table thead th{background:var(--sand-lt);font-size:.62rem;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;padding:.4rem .6rem;border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:10}
.vendor-table thead th:last-child{border-right:none}
.vendor-table tbody td{padding:.36rem .6rem;border-bottom:1px solid #f0ebe5;border-right:1px solid #f0ebe5;font-size:.76rem;vertical-align:middle}
.vendor-table tbody td:last-child{border-right:none}
.vendor-table tbody tr:hover td{background:var(--sand-lt)}
.vendor-table tbody tr.is-hidden td{opacity:.35}
.tbl-thumb{width:62px;height:62px;object-fit:cover;border-radius:4px;background:var(--sand-lt)}
.cell-edit{width:100%;border:none;background:transparent;font-size:.75rem;font-family:'DM Sans',sans-serif;color:var(--ink);padding:.1rem .2rem;border-radius:3px;resize:none}
.cell-edit:focus{outline:none;background:var(--white);box-shadow:0 0 0 2px var(--bark)}
.qty-stepper{display:flex;align-items:center;gap:.25rem}
.qty-btn{width:18px;height:18px;border-radius:3px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:.75rem;color:#888;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.qty-btn:hover{border-color:var(--bark);color:var(--bark)}
.qty-val{font-weight:600;color:var(--bark);min-width:22px;text-align:center;font-size:.8rem}
.hide-btn{padding:.15rem .35rem;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.62rem;color:#bbb;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.hide-btn:hover{border-color:var(--amber);color:var(--amber)}
.hide-btn.is-hidden{background:var(--sand-lt);border-color:var(--sand-dk);color:#c0b0a0}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.75rem;color:#ccc;padding:3rem;text-align:center}
.empty-state h3{font-size:.9rem;font-weight:500;color:#bbb}

/* DETAIL MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(42,36,32,.4);z-index:900;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .18s}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:12px;box-shadow:var(--shadow-md);width:520px;max-width:calc(100vw - 2rem);max-height:calc(100vh - 4rem);display:flex;flex-direction:column;overflow:hidden;transform:translateY(12px);transition:transform .18s}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head h2{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink)}
.modal-body{padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.7rem}
.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:.5rem;padding:.75rem 1rem;border-top:1px solid var(--border);flex-shrink:0}
.detail-img{width:100%;max-height:280px;object-fit:contain;border-radius:8px;background:var(--sand-lt)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.detail-field label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#bbb;display:block;margin-bottom:.15rem}
.detail-field .val{font-size:.82rem;color:var(--ink)}
.detail-field .val.editable{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);width:100%;padding:.1rem .2rem;border-radius:3px}
.detail-field .val.editable:focus{outline:none;background:var(--white);box-shadow:0 0 0 2px var(--bark)}

/* VENDOR MODALS */
.form-row{display:grid;gap:.5rem}
.form-row.cols-2{grid-template-columns:1fr 1fr}
label.form-label{font-size:.7rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.2rem}
.form-input{width:100%;padding:.38rem .55rem;border:1px solid var(--border);border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--ink);background:var(--mist);transition:all .15s}
.form-input:focus{outline:none;border-color:var(--bark);background:var(--white)}
.form-input::placeholder{color:#ccc}
textarea.form-input{resize:vertical;min-height:52px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:.75rem;color:#bbb}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--bark);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(1rem);background:var(--ink);color:var(--white);padding:.5rem 1rem;border-radius:6px;font-size:.78rem;z-index:9999;opacity:0;pointer-events:none;transition:all .2s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PAGING */
.pager{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem;flex-shrink:0;border-top:1px solid var(--border);background:var(--white)}
.pager span{font-size:.72rem;color:#aaa}


/* SELECT MODE */
.select-bar{display:none;align-items:center;gap:.6rem;padding:.45rem 1rem;background:#fff8f4;border-bottom:2px solid var(--bark);flex-shrink:0}
.select-bar.on{display:flex}
.select-bar-count{font-size:.78rem;font-weight:600;color:var(--bark)}
.card.selected{outline:2px solid var(--bark);outline-offset:-2px}
.card .card-check{position:absolute;top:.4rem;left:.4rem;width:18px;height:18px;accent-color:var(--bark);display:none;cursor:pointer;z-index:5}
.select-mode .card .card-check{display:block}
.select-mode .card{position:relative}
.card-check-wrap{position:absolute;top:.4rem;left:.4rem;z-index:5;display:none}
.select-mode .card-check-wrap{display:block}
.tbl-check{accent-color:var(--bark);cursor:pointer;width:14px;height:14px}
tr.selected td{background:rgba(139,115,85,.07)!important}

/* ORDER PDF */
#orderPdfModal .order-table{width:100%;border-collapse:collapse;font-size:11px}
#orderPdfModal .order-table th{background:#f5f0ea;padding:6px 8px;text-align:left;border:1px solid #e2dbd2;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#8b7355}
#orderPdfModal .order-table td{padding:6px 8px;border:1px solid #e2dbd2;vertical-align:middle}
#orderPdfModal .order-table tr:nth-child(even) td{background:#faf8f5}
#orderPdfModal .order-thumb{width:56px;height:56px;object-fit:cover;border-radius:3px}
#orderPdfModal .order-input{width:60px;border:1px solid #e2dbd2;border-radius:3px;padding:3px 5px;font-size:11px;text-align:center;font-family:'DM Sans',sans-serif}
.order-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:2px solid #e2dbd2}
.order-header h1{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#2a2420}
.order-header p{font-size:.72rem;color:#aaa;margin-top:.2rem}

@media print {
  body > *:not(#printArea){ display:none!important }
  #printArea{display:block!important;position:fixed;inset:0;background:white;padding:1.5cm;z-index:99999}
  #printArea .no-print{display:none!important}
  #printArea .order-table{font-size:10px}
  #printArea .order-input{border:1px solid #ccc}
  @page{margin:1.5cm;size:A4 landscape}
}

/* IMAGE UPLOAD */
.img-upload-area{border:2px dashed var(--sand-dk);border-radius:8px;padding:.75rem;text-align:center;cursor:pointer;transition:all .15s;background:var(--sand-lt);position:relative}
.img-upload-area:hover{border-color:var(--bark);background:#faf6f2}
.img-upload-area.has-img{border-style:solid;border-color:var(--sand-dk);padding:.4rem;background:var(--white)}
.img-upload-area img{width:100%;max-height:180px;object-fit:contain;border-radius:5px;display:block}
.img-upload-hint{font-size:.72rem;color:#bbb;margin-top:.3rem}
.img-upload-actions{display:flex;gap:.4rem;margin-top:.5rem;justify-content:center}
.img-or{font-size:.65rem;color:#ccc;text-align:center;margin:.35rem 0}

/* TABS */
.tab-rail{display:flex;background:var(--mist);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tab-btn{padding:.3rem .85rem;font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;border:none;background:transparent;cursor:pointer;color:#999;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--bark);background:var(--sand-lt)}
.tab-btn.active{background:var(--bark);color:var(--white)}

/* VIEWS */
.view{display:none}
.view.active{display:flex;flex-direction:column}
#view-catalog{display:none}
#view-catalog.active{display:grid;grid-template-columns:210px 1fr}

/* NOTES VIEW */
.notes-view{height:calc(100vh - var(--top));display:flex;gap:0;overflow:hidden}
.notes-sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.notes-sidebar-head{padding:.75rem .85rem .5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.notes-sidebar-head h3{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:.5rem}
.notes-list{flex:1;overflow-y:auto;padding:.35rem 0}
.note-item{padding:.42rem .85rem;cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.note-item:hover{background:var(--sand-lt)}
.note-item.active{background:var(--sand-lt);border-left-color:var(--bark)}
.note-item-title{font-size:.78rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item-date{font-size:.62rem;color:#bbb;margin-top:.08rem}
.note-item-preview{font-size:.65rem;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.05rem}
.notes-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--mist)}
.notes-toolbar{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.notes-editor-wrap{flex:1;overflow-y:auto;padding:1.5rem}
.notes-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.6rem;color:#ccc}
.notes-empty h3{font-size:.9rem;font-weight:500;color:#bbb}
.note-title-input{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);border:none;background:transparent;width:100%;outline:none;margin-bottom:.75rem;line-height:1.3}
.note-title-input::placeholder{color:#ddd}
.note-body-input{font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--ink);border:none;background:transparent;width:100%;outline:none;resize:none;min-height:400px;line-height:1.8}
.note-body-input::placeholder{color:#ccc;font-style:italic}
.note-meta{font-size:.65rem;color:#ccc;margin-bottom:1rem}
.tag-row{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1rem}
.note-tag{display:inline-flex;align-items:center;gap:.25rem;padding:.12rem .4rem;border-radius:20px;background:var(--sand-lt);border:1px solid var(--sand-dk);font-size:.65rem;color:var(--bark);cursor:pointer}
.note-tag:hover{background:var(--sand-dk);color:var(--bark-dk)}
.note-tag-del{color:#bbb;font-size:.6rem;line-height:1}
.note-tag-del:hover{color:var(--red)}
.tag-input{border:none;background:transparent;font-size:.65rem;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;width:80px}
.tag-input::placeholder{color:#ccc}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sand-dk);border-radius:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="https://raw.githubusercontent.com/happeningstudio/LittleBasics/refs/heads/main/images/LittleBasics.png" alt="Little Basics" class="topbar-logo">
    <div class="topbar-divider"></div>
    <div class="tab-rail">
      <button class="tab-btn active" onclick="switchView('catalog')">📦 Catalog</button>
      <button class="tab-btn" onclick="switchView('notes')">📝 Buying Notes</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn sm" onclick="exportData()">⬇ Export JSON</button>
    <button class="btn sm" onclick="document.getElementById('importFile').click()">⬆ Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="view active" id="view-catalog">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <h3>Vendors</h3>
      <button class="btn primary sm" style="width:100%" onclick="openAddVendor()">+ Add Vendor</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="btn ghost sm" style="width:100%" onclick="setActiveVendor('all')">📋 All items</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search style, color, notes…" oninput="onSearch()">
      </div>

      <!-- Category filter chips -->
      <div id="catChips" style="display:flex;gap:.3rem;flex-wrap:wrap"></div>

      <!-- Season filter -->
      <div id="seasonChips" style="display:flex;gap:.3rem;flex-wrap:wrap"></div>

      <label style="display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:#aaa;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="showHidden" onchange="render()" style="accent-color:var(--bark)"> Hidden
      </label>

      <span class="toolbar-meta" id="toolbarMeta"></span>

      <!-- View toggle -->
      <div class="view-toggle">
        <button class="vtog on" id="togCards" onclick="setView('cards')" title="Card view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="vtog" id="togTable" onclick="setView('table')" title="Table view">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <button class="btn primary sm" id="addItemBtn" onclick="openAddItem()" style="display:none">+ Add Item</button>

<script>

/* ══ SELECT MODE ══ */
let selectMode = false;
let selectedIds = new Set(); // "vendorId|itemId"

function selKey(vendorId, itemId){ return vendorId+'|'+itemId; }

function enterSelectMode(){
  selectMode = true;
  selectedIds.clear();
  document.getElementById('selectBar').classList.add('on');
  document.getElementById('selectModeBtn').style.display = 'none';
  document.getElementById('contentArea').classList.add('select-mode');
  updateSelectBar();
  render();
}

function exitSelectMode(){
  selectMode = false;
  selectedIds.clear();
  document.getElementById('selectBar').classList.remove('on');
  document.getElementById('selectModeBtn').style.display = '';
  document.getElementById('contentArea').classList.remove('select-mode');
  document.getElementById('selectAll').checked = false;
  render();
}

function toggleSelectItem(vendorId, itemId, checked){
  const k = selKey(vendorId, itemId);
  checked ? selectedIds.add(k) : selectedIds.delete(k);
  updateSelectBar();
  // highlight row/card
  const el = document.querySelector(`[data-selkey="${k}"]`);
  if(el) el.classList.toggle('selected', checked);
}

function toggleSelectAll(checked){
  document.querySelectorAll('[data-selkey]').forEach(el=>{
    const k = el.dataset.selkey;
    const cb = el.querySelector('.tbl-check, input[type=checkbox]');
    if(checked){ selectedIds.add(k); el.classList.add('selected'); if(cb)cb.checked=true; }
    else { selectedIds.delete(k); el.classList.remove('selected'); if(cb)cb.checked=false; }
  });
  updateSelectBar();
}

function updateSelectBar(){
  const n = selectedIds.size;
  document.getElementById('selectCount').textContent = n === 0 ? '0 selected' : `${n} item${n>1?'s':''} selected`;
  document.getElementById('selectAll').indeterminate = false;
}

function deleteSelected(){
  if(!selectedIds.size) return;
  if(!confirm(`Permanently delete ${selectedIds.size} item${selectedIds.size>1?'s':''}? This cannot be undone.`)) return;
  selectedIds.forEach(k=>{
    const [vendorId, itemId] = k.split('|');
    const v = getVendor(vendorId); if(!v) return;
    v.items = v.items.filter(i => i.id !== itemId);
  });
  selectedIds.clear();
  save();
  renderSidebar();
  renderChips();
  render();
  updateSelectBar();
  showToast(`✓ Items deleted`);
}


/* ══ ORDER PDF ══ */
function exportOrderPDF(){
  if(!selectedIds.size){ showToast('Select items first'); return; }

  // Gather selected items with their full data
  const items = [];
  selectedIds.forEach(k=>{
    const [vendorId, itemId] = k.split('|');
    const v = getVendor(vendorId); if(!v) return;
    const it = v.items.find(i=>i.id===itemId); if(!it) return;
    items.push({...it, _vendorName: v.name});
  });

  // Sort by category then styleNo
  items.sort((a,b)=>{
    if(a.category !== b.category) return a.category.localeCompare(b.category);
    return a.styleNo.localeCompare(b.styleNo);
  });

  // Set default date
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('orderDate').value = today;

  renderOrderTable(items);
  openModal('orderPdfModal');
}

function renderOrderTable(items){
  const rows = items.map((it,i) => `
    <tr>
      <td style="text-align:center;color:#aaa;font-size:.7rem">${i+1}</td>
      <td>${it.img ? `<img class="order-thumb" src="${it.img}">` : '<div style="width:56px;height:56px;background:#f5f0ea;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#ccc">📦</div>'}</td>
      <td><strong style="font-size:12px">${esc(it.styleNo)}</strong></td>
      <td style="font-size:.68rem;color:#b09070">${esc(it.category||'')}</td>
      <td style="font-size:.7rem;color:#666;max-width:120px">${esc(it.colors||'—')}</td>
      <td style="font-size:.68rem;color:#888;max-width:160px">${esc(it.sizes||'—')}</td>
      <td style="font-weight:600;color:#8b7355">${esc(it.price||'—')}</td>
      <td style="text-align:center">${esc(String(it.moq||0))}</td>
      <td><input class="order-input" type="number" min="0" value="${it.qtyOrdered||0}" placeholder="0" onchange="updateOrderQty('${it.id}', this.value)"></td>
      <td style="font-size:.7rem;color:#888;max-width:140px">${esc(it.notes||'')}</td>
    </tr>`).join('');

  document.getElementById('orderPdfBody').innerHTML = `
    <div class="order-header">
      <div>
        <h1>Purchase Order</h1>
        <p>Vendor: <strong>Yiwu Yicong</strong> &nbsp;·&nbsp; ${items.length} items selected</p>
      </div>
      <div style="text-align:right;font-size:.72rem;color:#aaa">
        <div>Store: <span id="orderStoreDisplay">Little Basics</span></div>
        <div>Date: <span id="orderDateDisplay">${new Date().toLocaleDateString()}</span></div>
      </div>
    </div>
    <table class="order-table">
      <thead><tr>
        <th style="width:28px">#</th>
        <th style="width:64px">Photo</th>
        <th style="width:80px">Style No.</th>
        <th style="width:80px">Category</th>
        <th>Colors</th>
        <th>Sizes</th>
        <th style="width:60px">Price</th>
        <th style="width:50px">MOQ</th>
        <th style="width:80px">Qty Order</th>
        <th>Notes</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#f5f0ea">
          <td colspan="6" style="text-align:right;font-weight:600;font-size:.75rem;color:#8b7355;padding:8px">Total items:</td>
          <td colspan="4" style="font-weight:700;font-size:.85rem;color:#2a2420;padding:8px">${items.length} styles</td>
        </tr>
      </tfoot>
    </table>
    <div style="margin-top:1.5rem;padding-top:.75rem;border-top:1px solid #e2dbd2;font-size:.68rem;color:#ccc;display:flex;justify-content:space-between">
      <span>Generated by Little Basics Store Manager</span>
      <span>littlebasics.com.au</span>
    </div>`;

  // Live update store/date display
  document.getElementById('orderStoreName').oninput = function(){
    document.getElementById('orderStoreDisplay').textContent = this.value || 'Little Basics';
  };
  document.getElementById('orderDate').oninput = function(){
    document.getElementById('orderDateDisplay').textContent = this.value ? new Date(this.value+'T00:00:00').toLocaleDateString() : '';
  };
}

function updateOrderQty(itemId, val){
  // Update qty in vendors data too
  vendors.forEach(v=>{
    const it = v.items.find(i=>i.id===itemId);
    if(it){ it.qtyOrdered = parseInt(val)||0; }
  });
  save();
}

function printOrder(){
  // Clone order content into printArea
  const pa = document.getElementById('printArea');
  pa.innerHTML = `<style>
    body{font-family:'DM Sans',sans-serif}
    table{width:100%;border-collapse:collapse;font-size:10px}
    th{background:#f5f0ea;padding:5px 7px;text-align:left;border:1px solid #e2dbd2;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#8b7355}
    td{padding:5px 7px;border:1px solid #e2dbd2;vertical-align:middle}
    tr:nth-child(even) td{background:#faf8f5}
    img{width:52px;height:52px;object-fit:cover;border-radius:3px}
    h1{font-size:18px;margin:0 0 4px}
    .hdr{display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2dbd2}
    .hdr-r{text-align:right;font-size:10px;color:#888}
    .footer{margin-top:12px;padding-top:8px;border-top:1px solid #e2dbd2;font-size:9px;color:#ccc;display:flex;justify-content:space-between}
  </style>` + document.getElementById('orderPdfBody').innerHTML;
  pa.style.display = 'block';
  window.print();
  pa.style.display = 'none';
}


/* ══ IMAGE UPLOAD ══ */
window._pendingItemImg = '';

function handleItemImgUpload(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    resizeAndSetItemImg(ev.target.result);
  };
  reader.readAsDataURL(file);
}

function handleItemImgUrl(url){
  if(!url) return;
  // Show preview immediately from URL
  window._pendingItemImg = url;
  document.getElementById('iImgPreviewImg').src = url;
  document.getElementById('iImgPreview').style.display = '';
  document.getElementById('iImgPlaceholder').style.display = 'none';
  document.getElementById('iImgArea').classList.add('has-img');
}

function resizeAndSetItemImg(dataUrl){
  const img = new Image();
  img.onload = function(){
    const canvas = document.createElement('canvas');
    const max = 240;
    let w = img.width, h = img.height;
    if(w > h){ if(w>max){h=Math.round(h*max/w);w=max;} }
    else { if(h>max){w=Math.round(w*max/h);h=max;} }
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    const resized = canvas.toDataURL('image/jpeg', 0.75);
    window._pendingItemImg = resized;
    document.getElementById('iImgPreviewImg').src = resized;
    document.getElementById('iImgPreview').style.display = '';
    document.getElementById('iImgPlaceholder').style.display = 'none';
    document.getElementById('iImgArea').classList.add('has-img');
  };
  img.src = dataUrl;
}

function clearItemImg(){
  window._pendingItemImg = '';
  document.getElementById('iImgPreview').style.display = 'none';
  document.getElementById('iImgPlaceholder').style.display = '';
  document.getElementById('iImgArea').classList.remove('has-img');
  document.getElementById('iImgFile').value = '';
  document.getElementById('iImgUrl').value = '';
}

function handleDetailImgUpload(e, vendorId, itemId){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const max = 240;
      let w=img.width, h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}
      else{if(h>max){w=Math.round(w*max/h);h=max;}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const resized = canvas.toDataURL('image/jpeg', 0.75);
      updateField(vendorId, itemId, 'img', resized);
      save(); render();
      // Re-open detail to show the new photo
      openDetail(vendorId, itemId);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handleDetailImgUrl(url, vendorId, itemId){
  if(!url || !url.startsWith('http')) return;
  updateField(vendorId, itemId, 'img', url);
  save(); render();
  openDetail(vendorId, itemId);
}

function clearDetailImg(vendorId, itemId){
  if(!confirm('Remove photo from this item?')) return;
  updateField(vendorId, itemId, 'img', '');
  save(); render();
  openDetail(vendorId, itemId);
}


/* ══ VIEW SWITCHING ══ */
function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`.tab-btn[onclick="switchView('${v}')"]`).classList.add('active');
  if(v==='notes') renderNotesList();
}

/* ══ BUYING NOTES ══ */
let notes = loadLocal('lb_notes_v1', []);
let activeNoteId = null;
let _noteTimer = null;

function saveNotes(){ saveLocal('lb_notes_v1', notes); }
function getNote(id){ return notes.find(n=>n.id===id); }

function newNote(){
  const n = {
    id: uid(),
    title: '',
    body: '',
    tags: [],
    updatedAt: new Date().toISOString()
  };
  notes.unshift(n);
  saveNotes();
  renderNotesList();
  openNote(n.id);
}

function openNote(id){
  activeNoteId = id;
  const n = getNote(id);
  if(!n) return;
  renderNotesList();

  const toolbar = document.getElementById('notesToolbar');
  toolbar.innerHTML = `
    <span style="font-size:.65rem;color:#bbb">Last edited ${formatNoteDate(n.updatedAt)}</span>
    <button class="btn danger sm" onclick="deleteNote()" style="margin-left:auto">Delete</button>`;

  const wrap = document.getElementById('notesEditorWrap');
  wrap.innerHTML = `
    <input class="note-title-input" id="noteTitleInput" placeholder="Note title…" value="${esc(n.title)}" oninput="autoSaveNote()">
    <div class="note-meta" id="noteMeta">Last edited ${formatNoteDate(n.updatedAt)}</div>
    <div class="tag-row" id="noteTagRow"></div>
    <textarea class="note-body-input" id="noteBodyInput" placeholder="Write your thoughts… e.g. Avoid bamboo rayon, check GOTS cert on all cotton items, Yiwu Yicong lead time is 4 weeks…" oninput="autoSaveNote()">${esc(n.body)}</textarea>`;

  renderNoteTags(n);
  document.getElementById('noteTitleInput').focus();
}

function renderNoteTags(n){
  const row = document.getElementById('noteTagRow');
  if(!row) return;
  row.innerHTML = n.tags.map((tag,i)=>
    `<span class="note-tag">${esc(tag)}<span class="note-tag-del" onclick="removeTag(${i})">✕</span></span>`
  ).join('') +
  `<input class="tag-input" id="tagInput" placeholder="+ tag" onkeydown="handleTagInput(event)">`;
}

function handleTagInput(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/,'');
    if(!val) return;
    const n = getNote(activeNoteId); if(!n) return;
    if(!n.tags.includes(val)) n.tags.push(val);
    autoSaveNote();
    renderNoteTags(n);
    setTimeout(()=>{ const ti=document.getElementById('tagInput'); if(ti)ti.focus(); },50);
  }
}

function removeTag(idx){
  const n = getNote(activeNoteId); if(!n) return;
  n.tags.splice(idx,1);
  autoSaveNote();
  renderNoteTags(n);
}

function autoSaveNote(){
  const n = getNote(activeNoteId); if(!n) return;
  const titleEl = document.getElementById('noteTitleInput');
  const bodyEl  = document.getElementById('noteBodyInput');
  if(titleEl) n.title = titleEl.value;
  if(bodyEl)  n.body  = bodyEl.value;
  n.updatedAt = new Date().toISOString();
  clearTimeout(_noteTimer);
  _noteTimer = setTimeout(()=>{
    saveNotes();
    renderNotesList();
    const meta = document.getElementById('noteMeta');
    if(meta) meta.textContent = 'Last edited ' + formatNoteDate(n.updatedAt);
  }, 600);
}

function deleteNote(){
  if(!activeNoteId) return;
  const n = getNote(activeNoteId);
  if(!confirm(`Delete "${n?.title||'this note'}"?`)) return;
  notes = notes.filter(x=>x.id!==activeNoteId);
  activeNoteId = null;
  saveNotes();
  renderNotesList();
  // Reset editor to empty state

    `<span style="font-size:.72rem;color:#bbb">Select or create a note</span>`;
  document.getElementById('notesEditorWrap').innerHTML = `
    <div class="notes-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <h3>No note selected</h3>
      <p style="font-size:.75rem;color:#ccc;text-align:center;max-width:200px">Create a note to jot down buying thoughts, vendor reminders, or material notes.</p>
      <button class="btn primary sm" onclick="newNote()">+ New Note</button>

function renderNotesList(){

  if(!el) return;
  if(!notes.length){
    el.innerHTML='<div style="padding:.75rem .85rem;font-size:.75rem;color:#ccc">No notes yet.</div>';
    return;
  }
  el.innerHTML = notes.map(n=>`

      <div class="note-item-title">${esc(n.title)||'Untitled note'}</div>
      <div class="note-item-date">${formatNoteDate(n.updatedAt)}</div>
      ${n.tags.length ? `<div class="note-item-preview">${n.tags.map(t=>'#'+t).join(' ')}</div>` : 
        n.body ? `<div class="note-item-preview">${esc(n.body.slice(0,60))}</div>` : ''}
    </div>`).join('');
}

function formatNoteDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs/60000);
  const diffHr  = Math.floor(diffMs/3600000);
  const diffDay = Math.floor(diffMs/86400000);
  if(diffMin < 1)  return 'just now';
  if(diffMin < 60) return diffMin+'m ago';
  if(diffHr  < 24) return diffHr+'h ago';
  if(diffDay < 7)  return diffDay+'d ago';
  return d.toLocaleDateString();
}

/* ══ STORAGE ══ */
function loadLocal(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ══ STATE ══ */
let vendors = [];
let activeVendorId = 'all';
let activeCat = 'all';
let activeSeason = 'all';
let viewMode = 'cards';  // 'cards' | 'table'
let page = 0;
const PAGE_SIZE = 80;
let searchQ = '';
let _searchTimer = null;
let _detailItem = null; // currently open item

/* ══ BOOT ══ */
window.addEventListener('DOMContentLoaded', async () => {
  // Try localStorage first
  const saved = loadLocal('lb_vendors_v2', null);
  if (saved && saved.length) {
    vendors = saved;
    boot();
    return;
  }
  // Try loading the companion JSON
  try {
    const r = await fetch('littlebasics-vendors.json');
    if (r.ok) {
      const data = await r.json();
      if (data.vendors) { vendors = data.vendors; saveLocal('lb_vendors_v2', vendors); }
    }
  } catch(e) {}
  boot();
});

function boot() {
  if (vendors.length) activeVendorId = vendors[0].id;
  renderSidebar();
  renderChips();
  render();
}

function save() { saveLocal('lb_vendors_v2', vendors); }
function getVendor(id){ return vendors.find(v=>v.id===id); }

/* ══ ALL ITEMS (flat) ══ */
function allItems(){
  const arr=[];
  vendors.forEach(v=>v.items.forEach(it=>arr.push({...it,_vendorId:v.id,_vendorName:v.name})));
  return arr;
}

/* ══ FILTERED ITEMS ══ */
function filteredItems(){
  let rows = activeVendorId==='all' ? allItems()
    : (getVendor(activeVendorId)?.items||[]).map(it=>({...it,_vendorId:activeVendorId,_vendorName:getVendor(activeVendorId)?.name||''}));

  if (activeCat !== 'all') rows = rows.filter(it=>(it.category||'').trim() === activeCat.trim());
  if (activeSeason !== 'all') rows = rows.filter(it=>normSeason(it.season) === activeSeason);
  if (!document.getElementById('showHidden')?.checked) rows = rows.filter(it=>!it.hidden);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    rows = rows.filter(it=>[it.styleNo,it.colors,it.category,it.season,it.notes,it.material,it._vendorName]
      .some(f=>(f||'').toLowerCase().includes(q)));
  }
  return rows;
}

/* ══ CHIPS ══ */
function getCategories(){
  const s=new Set(); allItems().forEach(it=>{if(it.category)s.add(it.category);}); return [...s].sort();
}
function normSeason(s){
  if(!s) return '';
  const t = s.trim().toLowerCase();
  if(t.includes('spring') && t.includes('autumn')) return 'Spring/Autumn';
  if(t.includes('autumn') || t.includes('fall')) return 'Autumn';
  if(t.includes('spring')) return 'Spring';
  if(t.includes('summer')) return 'Summer';
  if(t.includes('winter')) return 'Winter';
  return s.trim();
}
function getSeasons(){
  const s=new Set();
  allItems().forEach(it=>{ const n=normSeason(it.season); if(n) s.add(n); });
  return [...s].sort();
}
function renderChips(){
  const cats = getCategories();
  const seasons = getSeasons();
  const cc = document.getElementById('catChips');
  const sc = document.getElementById('seasonChips');

  // Use data-val attributes to avoid quote issues in innerHTML onclick
  cc.innerHTML = cats.length
    ? `<button class="chip${activeCat==='all'?' on':''}" data-cat="all">All types</button>`
      + cats.map(c=>`<button class="chip${activeCat===c?' on':''}" data-cat="${c.replace(/"/g,'')}">${c.replace('Baby ','')}</button>`).join('')
    : '';

  sc.innerHTML = seasons.length > 1
    ? `<button class="chip${activeSeason==='all'?' on':''}" data-season="all">All seasons</button>`
      + seasons.map(s=>`<button class="chip${activeSeason===s?' on':''}" data-season="${s.replace(/"/g,'')}">${s}</button>`).join('')
    : '';

  // Attach click handlers via JS (no inline onclick)
  cc.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=>setCat(btn.dataset.cat));
  });
  sc.querySelectorAll('[data-season]').forEach(btn=>{
    btn.addEventListener('click', ()=>setSeason(btn.dataset.season));
  });
}
function setCat(c){ activeCat=c; page=0; renderChips(); render(); }
function setSeason(s){ activeSeason=s; page=0; renderChips(); render(); }

/* ══ RENDER ══ */
function render(){
  const rows = filteredItems();
  const total = rows.length;
  const allCount = activeVendorId==='all' ? allItems().length : (getVendor(activeVendorId)?.items.length||0);
  document.getElementById('toolbarMeta').textContent = `${total} of ${allCount}`;
  document.getElementById('addItemBtn').style.display = activeVendorId==='all' ? 'none' : '';

  const area = document.getElementById('contentArea');

  if (!vendors.length){
    area.innerHTML=`<div class="empty-state"><h3>No vendors yet</h3><p>Click "+ Add Vendor" to get started, then import your catalog JSON.</p></div>`;
    document.getElementById('pager').style.display='none';
    return;
  }
  if (!rows.length){
    area.innerHTML=`<div class="empty-state"><h3>No items found</h3><p>${searchQ?'Try a different search term.':'Nothing matches these filters.'}</p></div>`;
    document.getElementById('pager').style.display='none';
    return;
  }

  const totalPages = Math.ceil(rows.length / PAGE_SIZE);
  if (page >= totalPages) page = totalPages-1;
  const pageRows = rows.slice(page*PAGE_SIZE, (page+1)*PAGE_SIZE);

  if (viewMode==='cards'){
    area.innerHTML = `<div class="card-grid">${pageRows.map(it=>cardHTML(it)).join('')}</div>`;
  } else {
    area.innerHTML = `<table class="vendor-table"><thead><tr>
      <th style="width:28px"></th>
      ${activeVendorId==='all'?'<th style="width:80px">Vendor</th>':''}

      <th style="width:90px">Category</th>

      <th style="width:160px">Sizes</th>
      <th style="width:65px">Price</th>
      <th style="width:110px">Material</th>
      <th style="min-width:120px">Notes</th>
      <th style="width:80px">Qty Ordered</th>
      <th style="width:90px">Actions</th>
    </tr></thead><tbody>${pageRows.map(it=>rowHTML(it)).join('')}</tbody></table>`;
  }

  // Pager
  const pager = document.getElementById('pager');
  pager.style.display = totalPages > 1 ? '' : 'none';
  document.getElementById('pageInfo').textContent = `Page ${page+1} of ${totalPages}  (${rows.length} items)`;
  document.getElementById('prevBtn').disabled = page===0;

}

let _detailQtyLocal = 0;
function detailQty(d){
  if(!_detailItem)return;
  const {vendorId,itemId}=_detailItem;
  const v=getVendor(vendorId);const it=v?.items.find(i=>i.id===itemId);if(!it)return;
  it.qtyOrdered=Math.max(0,(it.qtyOrdered||0)+d);
  save(); render();
  document.getElementById('d-qty').textContent=it.qtyOrdered;
}

function detailToggleHide(){
  if(!_detailItem)return;
  const {vendorId,itemId}=_detailItem;
  const v=getVendor(vendorId);const it=v?.items.find(i=>i.id===itemId);if(!it)return;
  it.hidden=!it.hidden;
  save(); render();
  const btn=document.getElementById('d-hide');
  btn.textContent=it.hidden?'Hidden':'Visible';
  btn.classList.toggle('is-hidden',it.hidden);
}

function saveDetailEdits(){
  if(!_detailItem)return;

  const v=getVendor(vendorId);const it=v?.items.find(i=>i.id===itemId);if(!it)return;

  it.material = document.getElementById('d-material')?.value.trim()||'';
  it.notes    = document.getElementById('d-notes')?.value.trim()||'';
  it.link     = document.getElementById('d-link')?.value.trim()||'';
  save(); render();
  closeModal('detailModal');
  showToast('✓ Item updated');
}

function deleteCurrentItem(){
  if(!_detailItem)return;
  const {vendorId,itemId}=_detailItem;
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  if(!confirm(`Delete ${it.styleNo}?`))return;
  v.items=v.items.filter(i=>i.id!==itemId);
  save(); renderSidebar(); renderChips(); render();
  closeModal('detailModal'); showToast('Item deleted');
}

/* ══ MUTATIONS ══ */
function changeQty(vendorId,itemId,delta){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it.qtyOrdered=Math.max(0,(it.qtyOrdered||0)+delta);
  save();
  const el=document.getElementById('qty-'+itemId);if(el)el.textContent=it.qtyOrdered;
}

function updateField(vendorId,itemId,field,val){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it[field]=val; save();
}

function toggleHide(vendorId,itemId){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it.hidden=!it.hidden;
  save(); renderSidebar(); render();
}

function openAddItem(){
  if(activeVendorId==='all')return;
  const v=getVendor(activeVendorId);if(!v)return;
  document.getElementById('itemModalTitle').textContent='Add Item — '+v.name;
  document.getElementById('itemModalVendorId').value=activeVendorId;
  document.getElementById('itemModalItemId').value='';
  ['iStyleNo','iCategory','iSeason','iPrice','iColors','iSizes','iMaterial','iNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iMoq').value='0';
  clearItemImg();
  document.getElementById('iImgUrl').value='';
  openModal('itemModal');
  setTimeout(()=>document.getElementById('iStyleNo').focus(),80);
}
function saveItem(){
  const styleNo=document.getElementById('iStyleNo').value.trim();
  if(!styleNo){alert('Style number required.');return;}
  const vendorId=document.getElementById('itemModalVendorId').value;
  const v=getVendor(vendorId);if(!v)return;
  v.items.push({
    id:uid(), styleNo,
    category:document.getElementById('iCategory').value.trim(),
    season:document.getElementById('iSeason').value.trim(),
    price:document.getElementById('iPrice').value.trim(),
    colors:document.getElementById('iColors').value.trim(),
    sizes:document.getElementById('iSizes').value.trim(),
    material:document.getElementById('iMaterial').value.trim(),
    notes:document.getElementById('iNotes').value.trim(),
    moq:parseInt(document.getElementById('iMoq').value)||0,
    link:'', hidden:false, qtyOrdered:0,
    img: window._pendingItemImg || ''
  });
  window._pendingItemImg = '';
  save(); closeModal('itemModal'); renderSidebar(); renderChips(); render();
  showToast('✓ Item added');
}

/* ══ EXPORT / IMPORT ══ */
function exportData(){
  const blob=new Blob([JSON.stringify({vendors},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='littlebasics-vendors-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.vendors&&Array.isArray(data.vendors)){
        if(vendors.length&&!confirm('Replace current data?'))return;
        vendors=data.vendors; save();
        activeVendorId=vendors.length?vendors[0].id:'all';
        renderSidebar(); renderChips(); render();
        showToast('✓ Imported');
      } else alert('Invalid file format.');
    }catch{alert('Could not parse JSON.');}
  };
  reader.readAsText(file); e.target.value='';
}

/* ══ MODAL HELPERS ══ */
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-backdrop.open').forEach(el=>el.classList.remove('open'));
});

/* ══ TOAST ══ */
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ══ UTIL ══ */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
