<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Basics — Vendor Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --sand:#e8ddd0;--sand-lt:#f5f0ea;--sand-dk:#c8b89e;
  --bark:#8b7355;--bark-dk:#6e5c42;--bark-lt:#b09070;
  --ink:#2a2420;--mist:#f7f4f1;--white:#fff;
  --border:#e2dbd2;
  --green:#3d7a52;--red:#b84040;--amber:#c97c35;
  --top:52px;
  --shadow:0 1px 8px rgba(42,36,32,.07);
  --shadow-md:0 4px 20px rgba(42,36,32,.11);
}

body{font-family:'DM Sans',sans-serif;background:var(--mist);color:var(--ink);font-size:13px;line-height:1.5;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  height:var(--top);background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;position:sticky;top:0;z-index:400;gap:1rem;
}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.topbar-logo{height:28px;display:block}
.topbar-divider{width:1px;height:20px;background:var(--border)}
.topbar-title{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--bark);letter-spacing:.01em}
.back-link{font-size:.72rem;color:#aaa;text-decoration:none;display:flex;align-items:center;gap:.25rem;transition:color .15s}
.back-link:hover{color:var(--bark)}

.topbar-right{display:flex;align-items:center;gap:.5rem}

/* ── BUTTONS ── */
.btn{
  padding:.32rem .75rem;font-family:'DM Sans',sans-serif;
  font-size:.73rem;font-weight:500;border-radius:5px;
  border:1px solid var(--border);background:var(--white);
  cursor:pointer;color:#666;transition:all .15s;white-space:nowrap;
}
.btn:hover{border-color:var(--bark);color:var(--bark)}
.btn.primary{background:var(--bark);color:var(--white);border-color:var(--bark)}
.btn.primary:hover{background:var(--bark-dk)}
.btn.danger{color:var(--red);border-color:currentColor}
.btn.danger:hover{background:var(--red);color:var(--white)}
.btn.sm{padding:.22rem .55rem;font-size:.68rem}
.btn.ghost{background:transparent;border-color:transparent;color:#aaa}
.btn.ghost:hover{color:var(--bark);border-color:var(--sand-dk);background:var(--sand-lt)}

/* ── LAYOUT ── */
.page{
  display:grid;
  grid-template-columns:220px 1fr;
  height:calc(100vh - var(--top));
  overflow:hidden;
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:.75rem .85rem .5rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-head h3{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:.5rem}
.sidebar-list{flex:1;overflow-y:auto;padding:.4rem 0}
.sidebar-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:.42rem .85rem;cursor:pointer;
  font-size:.8rem;font-weight:500;color:#666;
  border-left:2px solid transparent;
  transition:all .12s;gap:.4rem;
}
.sidebar-item:hover{background:var(--sand-lt);color:var(--bark)}
.sidebar-item.active{background:var(--sand-lt);color:var(--bark);border-left-color:var(--bark);font-weight:600}
.sidebar-item-count{font-size:.65rem;color:#bbb;background:var(--mist);padding:.1rem .35rem;border-radius:20px;flex-shrink:0}
.sidebar-item.active .sidebar-item-count{background:var(--sand-dk);color:var(--bark-dk)}
.sidebar-footer{padding:.6rem .85rem;border-top:1px solid var(--border);flex-shrink:0}

/* ── MAIN AREA ── */
.main{display:flex;flex-direction:column;overflow:hidden}

.toolbar{
  display:flex;align-items:center;gap:.5rem;
  padding:.6rem 1rem;background:var(--white);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}

.search-wrap{position:relative;flex:1;min-width:140px;max-width:260px}
.search-wrap svg{position:absolute;left:.5rem;top:50%;transform:translateY(-50%);pointer-events:none;color:#bbb}
.search-input{
  width:100%;padding:.32rem .5rem .32rem 1.6rem;
  border:1px solid var(--border);border-radius:5px;
  font-family:'DM Sans',sans-serif;font-size:.75rem;
  background:var(--mist);color:var(--ink);
  transition:all .15s;
}
.search-input:focus{outline:none;border-color:var(--bark);background:var(--white)}
.search-input::placeholder{color:#bbb}

.filter-chips{display:flex;gap:.3rem;flex-wrap:wrap}
.chip{
  padding:.22rem .55rem;font-family:'DM Sans',sans-serif;
  font-size:.68rem;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--white);
  cursor:pointer;color:#999;transition:all .12s;white-space:nowrap;
}
.chip:hover{border-color:var(--bark);color:var(--bark)}
.chip.on{background:var(--bark);color:var(--white);border-color:var(--bark)}

.toolbar-meta{margin-left:auto;font-size:.68rem;color:#bbb;white-space:nowrap}

/* ── TABLE AREA ── */
.table-wrap{flex:1;overflow:auto}

.vendor-table{width:100%;border-collapse:collapse;min-width:860px}
.vendor-table thead th{
  background:var(--sand-lt);font-size:.62rem;font-weight:600;
  color:#aaa;text-transform:uppercase;letter-spacing:.07em;
  padding:.4rem .6rem;border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);text-align:left;
  white-space:nowrap;position:sticky;top:0;z-index:10;
}
.vendor-table thead th:last-child{border-right:none}
.vendor-table tbody td{
  padding:.36rem .6rem;border-bottom:1px solid #f0ebe5;
  border-right:1px solid #f0ebe5;font-size:.76rem;
  vertical-align:middle;
}
.vendor-table tbody td:last-child{border-right:none}
.vendor-table tbody tr:hover td{background:var(--sand-lt)}
.vendor-table tbody tr.is-hidden td{opacity:.35}
.vendor-table tbody tr.is-hidden:hover td{opacity:.6}

/* col widths */
.col-style{width:90px;min-width:80px}
.col-season{width:70px}
.col-colors{width:110px}
.col-sizes{width:130px}
.col-price{width:70px}
.col-moq{width:55px}
.col-material{width:120px}
.col-notes{min-width:120px}
.col-qty{width:80px}
.col-actions{width:70px}

/* editable cell */
.cell-edit{
  width:100%;border:none;background:transparent;
  font-size:.75rem;font-family:'DM Sans',sans-serif;
  color:var(--ink);padding:.1rem .2rem;border-radius:3px;
  resize:none;
}
.cell-edit:focus{
  outline:none;background:var(--white);
  box-shadow:0 0 0 2px var(--bark);
}

/* qty stepper */
.qty-stepper{display:flex;align-items:center;gap:.25rem}
.qty-btn{
  width:18px;height:18px;border-radius:3px;border:1px solid var(--border);
  background:var(--white);cursor:pointer;font-size:.75rem;line-height:1;
  color:#888;display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.qty-btn:hover{border-color:var(--bark);color:var(--bark)}
.qty-val{font-weight:600;color:var(--bark);min-width:22px;text-align:center;font-size:.8rem}

/* hide toggle */
.hide-btn{
  padding:.15rem .35rem;border-radius:4px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-size:.62rem;color:#bbb;
  font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap;
}
.hide-btn:hover{border-color:var(--amber);color:var(--amber)}
.hide-btn.is-hidden{background:var(--sand-lt);border-color:var(--sand-dk);color:#c0b0a0}

.link-btn{
  font-size:.68rem;color:var(--bark);text-decoration:none;
  display:inline-flex;align-items:center;gap:.2rem;
}
.link-btn:hover{text-decoration:underline}

.tag{
  display:inline-block;padding:.1rem .35rem;border-radius:4px;
  font-size:.62rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
}
.tag-season{background:var(--sand-lt);color:var(--bark)}

/* ── EMPTY STATE ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:.75rem;color:#ccc;padding:3rem;text-align:center;
}
.empty-state svg{opacity:.3}
.empty-state h3{font-size:.9rem;font-weight:500;color:#bbb}
.empty-state p{font-size:.75rem;color:#ccc;max-width:260px}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(42,36,32,.35);
  z-index:900;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(2px);
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{
  background:var(--white);border-radius:12px;box-shadow:var(--shadow-md);
  width:480px;max-width:calc(100vw - 2rem);max-height:calc(100vh - 4rem);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(12px);transition:transform .18s;
}
.modal-backdrop.open .modal{transform:translateY(0)}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-head h2{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--ink)}
.modal-body{padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.7rem}
.modal-foot{
  display:flex;align-items:center;justify-content:flex-end;gap:.5rem;
  padding:.75rem 1rem;border-top:1px solid var(--border);flex-shrink:0;
}

/* form fields */
.form-row{display:grid;gap:.5rem}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
label{font-size:.7rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.2rem}
.form-input{
  width:100%;padding:.38rem .55rem;border:1px solid var(--border);
  border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.8rem;
  color:var(--ink);background:var(--mist);transition:all .15s;
}
.form-input:focus{outline:none;border-color:var(--bark);background:var(--white)}
.form-input::placeholder{color:#ccc}
textarea.form-input{resize:vertical;min-height:52px}

/* toast */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(1rem);
  background:var(--ink);color:var(--white);padding:.5rem 1rem;
  border-radius:6px;font-size:.78rem;z-index:9999;
  opacity:0;pointer-events:none;transition:all .2s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* scrollbars */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sand-dk);border-radius:10px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="https://raw.githubusercontent.com/happeningstudio/LittleBasics/refs/heads/main/images/LittleBasics.png" alt="Little Basics" class="topbar-logo">
    <div class="topbar-divider"></div>
    <span class="topbar-title">Vendor Catalog</span>
  </div>
  <div class="topbar-right">
    <button class="btn sm" onclick="exportData()">⬇ Export JSON</button>
    <button class="btn sm" onclick="document.getElementById('importFile').click()">⬆ Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<!-- PAGE LAYOUT -->
<div class="page">

  <!-- SIDEBAR: vendor list -->
  <div class="sidebar">
    <div class="sidebar-head">
      <h3>Vendors</h3>
      <button class="btn primary sm" style="width:100%" onclick="openAddVendor()">+ Add Vendor</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="btn ghost sm" style="width:100%" onclick="setActiveVendor('all')">📋 View all items</button>
    </div>
  </div>

  <!-- MAIN: items table -->
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search items…" oninput="renderTable()">
      </div>
      <div class="filter-chips" id="seasonChips"></div>
      <label style="display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:#aaa;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="showHidden" onchange="renderTable()" style="accent-color:var(--bark)"> Show hidden
      </label>
      <span class="toolbar-meta" id="toolbarMeta"></span>
      <button class="btn primary sm" onclick="openAddItem()" id="addItemBtn">+ Add Item</button>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
  </div>
</div>

<!-- ADD VENDOR MODAL -->
<div class="modal-backdrop" id="vendorModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="vendorModalTitle">Add Vendor</h2>
      <button class="btn ghost sm" onclick="closeModal('vendorModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="vendorModalId">
      <div class="form-row">
        <div>
          <label>Vendor / Brand Name *</label>
          <input class="form-input" id="vName" placeholder="e.g. Minymo, Liewood…">
        </div>
      </div>
      <div class="form-row cols-2">
        <div>
          <label>Contact / Rep</label>
          <input class="form-input" id="vContact" placeholder="Name or email">
        </div>
        <div>
          <label>Website</label>
          <input class="form-input" id="vWebsite" placeholder="https://…">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Notes</label>
          <textarea class="form-input" id="vNotes" placeholder="Payment terms, lead time, etc."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn danger sm" id="vendorDeleteBtn" onclick="deleteVendor()" style="margin-right:auto;display:none">Delete Vendor</button>
      <button class="btn sm" onclick="closeModal('vendorModal')">Cancel</button>
      <button class="btn primary sm" onclick="saveVendor()">Save Vendor</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT ITEM MODAL -->
<div class="modal-backdrop" id="itemModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="itemModalTitle">Add Item</h2>
      <button class="btn ghost sm" onclick="closeModal('itemModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="itemModalVendorId">
      <input type="hidden" id="itemModalItemId">
      <div class="form-row cols-2">
        <div>
          <label>Style / Item No. *</label>
          <input class="form-input" id="iStyleNo" placeholder="e.g. 13100703">
        </div>
        <div>
          <label>Season</label>
          <input class="form-input" id="iSeason" placeholder="e.g. SS25, AW25">
        </div>
      </div>
      <div class="form-row cols-2">
        <div>
          <label>Vendor</label>
          <select class="form-input" id="iVendorSelect"></select>
        </div>
        <div>
          <label>Price</label>
          <input class="form-input" id="iPrice" placeholder="e.g. $18.50">
        </div>
      </div>
      <div class="form-row cols-2">
        <div>
          <label>Colors</label>
          <input class="form-input" id="iColors" placeholder="e.g. Navy, Sage, Cream">
        </div>
        <div>
          <label>MOQ</label>
          <input class="form-input" id="iMoq" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Sizes</label>
          <input class="form-input" id="iSizes" placeholder="e.g. 62, 68, 74, 80, 86, 92">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Material</label>
          <input class="form-input" id="iMaterial" placeholder="e.g. 100% GOTS Cotton">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Link / Reference</label>
          <input class="form-input" id="iLink" placeholder="https://…">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Notes</label>
          <textarea class="form-input" id="iNotes" placeholder="Restock priority, colour notes, etc."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn danger sm" id="itemDeleteBtn" onclick="deleteItem()" style="margin-right:auto;display:none">Delete</button>
      <button class="btn sm" onclick="closeModal('itemModal')">Cancel</button>
      <button class="btn primary sm" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
function loadLocal(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function saveLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let vendors = loadLocal('lb_vendors_v2', []);
let activeVendorId = vendors.length ? vendors[0].id : 'all';
let activeSeason = 'all';

function save(){ saveLocal('lb_vendors_v2', vendors); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getVendor(id){ return vendors.find(v=>v.id===id); }
function allItems(){
  const arr=[];
  vendors.forEach(v=>v.items.forEach(it=>arr.push({...it,_vendorId:v.id,_vendorName:v.name})));
  return arr;
}

/* ══════════════════════════════════════════
   RENDER SIDEBAR
══════════════════════════════════════════ */
function renderSidebar(){
  const el=document.getElementById('sidebarList');
  if(!vendors.length){
    el.innerHTML='<div style="padding:.75rem .85rem;font-size:.75rem;color:#ccc">No vendors yet.</div>';
    return;
  }
  el.innerHTML=vendors.map(v=>{
    const count=v.items.filter(i=>!i.hidden).length;
    const total=v.items.length;
    return `<div class="sidebar-item${activeVendorId===v.id?' active':''}" onclick="setActiveVendor('${v.id}')">
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.name)}</span>
      <span class="sidebar-item-count" title="${total} total">${count}</span>
      <button class="btn ghost sm" style="padding:.1rem .3rem;font-size:.65rem" onclick="event.stopPropagation();openEditVendor('${v.id}')" title="Edit vendor">✎</button>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   RENDER TABLE
══════════════════════════════════════════ */
function getSeasons(){
  const s=new Set();
  vendors.forEach(v=>v.items.forEach(i=>{ if(i.season)s.add(i.season); }));
  return [...s].sort();
}

function renderSeasonChips(){
  const seasons=getSeasons();
  const el=document.getElementById('seasonChips');
  if(!seasons.length){el.innerHTML='';return;}
  el.innerHTML=`<button class="chip${activeSeason==='all'?' on':''}" onclick="setSeason('all')">All</button>`
    +seasons.map(s=>`<button class="chip${activeSeason===s?' on':''}" onclick="setSeason('${s}')">${esc(s)}</button>`).join('');
}

function setSeason(s){ activeSeason=s; renderSeasonChips(); renderTable(); }

function renderTable(){
  const search=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const showHidden=document.getElementById('showHidden')?.checked;
  const wrap=document.getElementById('tableWrap');

  // Get items for active vendor
  let rows;
  if(activeVendorId==='all'){
    rows=allItems();
  } else {
    const v=getVendor(activeVendorId);
    rows=v?(v.items.map(it=>({...it,_vendorId:v.id,_vendorName:v.name}))):[]; 
  }

  // Season filter
  if(activeSeason!=='all') rows=rows.filter(it=>it.season===activeSeason);

  // Search
  if(search){
    rows=rows.filter(it=>[it.styleNo,it.colors,it.sizes,it.material,it.notes,it._vendorName,it.season]
      .some(f=>(f||'').toLowerCase().includes(search)));
  }

  // Hidden filter
  const visRows = showHidden ? rows : rows.filter(it=>!it.hidden);

  // Update meta
  const allCount=activeVendorId==='all'?allItems().length:(getVendor(activeVendorId)?.items.length||0);
  document.getElementById('toolbarMeta').textContent=`${visRows.length} of ${allCount} items`;
  document.getElementById('addItemBtn').style.display=activeVendorId==='all'?'none':'';

  // Empty state
  if(!vendors.length){
    wrap.innerHTML=`<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      <h3>No vendors yet</h3>
      <p>Click "+ Add Vendor" in the sidebar to get started.</p>
    </div>`;
    return;
  }

  if(!visRows.length){
    wrap.innerHTML=`<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <h3>No items found</h3>
      <p>${search?'Try a different search term.':'Add items to this vendor using the button above.'}</p>
    </div>`;
    return;
  }

  const showVendorCol = activeVendorId==='all';

  wrap.innerHTML=`<table class="vendor-table">
    <thead><tr>
      ${showVendorCol?'<th style="width:90px">Vendor</th>':''}
      <th class="col-style">Style No.</th>
      <th class="col-season">Season</th>
      <th class="col-colors">Colors</th>
      <th class="col-sizes">Sizes</th>
      <th class="col-price">Price</th>
      <th class="col-moq">MOQ</th>
      <th class="col-material">Material</th>
      <th class="col-notes">Notes</th>
      <th class="col-qty">Qty Ordered</th>
      <th class="col-actions">Actions</th>
    </tr></thead>
    <tbody>${visRows.map(it=>rowHTML(it, showVendorCol, showHidden)).join('')}</tbody>
  </table>`;
}

function rowHTML(it, showVendorCol, showHidden){
  const hiddenClass = it.hidden ? ' is-hidden' : '';
  return `<tr class="${hiddenClass}" data-id="${it.id}" data-vendor="${it._vendorId}">
    ${showVendorCol?`<td><span style="font-size:.7rem;color:var(--bark-lt);font-weight:500">${esc(it._vendorName)}</span></td>`:''}
    <td class="col-style">
      <span style="font-weight:600;font-size:.78rem">${esc(it.styleNo)}</span>
    </td>
    <td class="col-season">
      ${it.season?`<span class="tag tag-season">${esc(it.season)}</span>`:'<span style="color:#ccc">—</span>'}
    </td>
    <td class="col-colors">
      <textarea class="cell-edit" rows="1" style="min-height:24px" onchange="updateField('${it._vendorId}','${it.id}','colors',this.value)" onfocus="autoGrow(this)" oninput="autoGrow(this)">${esc(it.colors)}</textarea>
    </td>
    <td class="col-sizes">
      <textarea class="cell-edit" rows="1" style="min-height:24px" onchange="updateField('${it._vendorId}','${it.id}','sizes',this.value)" onfocus="autoGrow(this)" oninput="autoGrow(this)">${esc(it.sizes)}</textarea>
    </td>
    <td class="col-price">
      <input class="cell-edit" type="text" value="${esc(it.price)}" onchange="updateField('${it._vendorId}','${it.id}','price',this.value)">
    </td>
    <td class="col-moq" style="text-align:center">
      <input class="cell-edit" type="number" min="0" value="${it.moq||0}" style="width:42px;text-align:center" onchange="updateField('${it._vendorId}','${it.id}','moq',parseInt(this.value)||0)">
    </td>
    <td class="col-material">
      <textarea class="cell-edit" rows="1" style="min-height:24px" onchange="updateField('${it._vendorId}','${it.id}','material',this.value)" onfocus="autoGrow(this)" oninput="autoGrow(this)">${esc(it.material)}</textarea>
    </td>
    <td class="col-notes">
      <textarea class="cell-edit" rows="1" style="min-height:24px" onchange="updateField('${it._vendorId}','${it.id}','notes',this.value)" onfocus="autoGrow(this)" oninput="autoGrow(this)">${esc(it.notes)}</textarea>
    </td>
    <td class="col-qty">
      <div class="qty-stepper">
        <button class="qty-btn" onclick="changeQty('${it._vendorId}','${it.id}',-1)">−</button>
        <span class="qty-val">${it.qtyOrdered||0}</span>
        <button class="qty-btn" onclick="changeQty('${it._vendorId}','${it.id}',1)">+</button>
      </div>
    </td>
    <td class="col-actions" style="white-space:nowrap">
      <button class="hide-btn${it.hidden?' is-hidden':''}" onclick="toggleHide('${it._vendorId}','${it.id}')">${it.hidden?'Hidden':'Visible'}</button>
      ${it.link?`<a href="${esc(it.link)}" target="_blank" class="link-btn" style="margin-top:.2rem;display:block">↗ Link</a>`:''}
    </td>
  </tr>`;
}

function autoGrow(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

/* ══════════════════════════════════════════
   DATA MUTATIONS
══════════════════════════════════════════ */
function updateField(vendorId, itemId, field, val){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it[field]=val;
  save();
}

function changeQty(vendorId, itemId, delta){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it.qtyOrdered=Math.max(0,(it.qtyOrdered||0)+delta);
  save();
  // update just the qty display
  const row=document.querySelector(`tr[data-id="${itemId}"]`);
  if(row){const qv=row.querySelector('.qty-val');if(qv)qv.textContent=it.qtyOrdered;}
}

function toggleHide(vendorId, itemId){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  it.hidden=!it.hidden;
  save();
  renderSidebar();
  renderTable();
}

/* ══════════════════════════════════════════
   VENDOR MODAL
══════════════════════════════════════════ */
function openAddVendor(){
  document.getElementById('vendorModalTitle').textContent='Add Vendor';
  document.getElementById('vendorModalId').value='';
  document.getElementById('vName').value='';
  document.getElementById('vContact').value='';
  document.getElementById('vWebsite').value='';
  document.getElementById('vNotes').value='';
  document.getElementById('vendorDeleteBtn').style.display='none';
  openModal('vendorModal');
  setTimeout(()=>document.getElementById('vName').focus(),80);
}

function openEditVendor(id){
  const v=getVendor(id);if(!v)return;
  document.getElementById('vendorModalTitle').textContent='Edit Vendor';
  document.getElementById('vendorModalId').value=id;
  document.getElementById('vName').value=v.name;
  document.getElementById('vContact').value=v.contact||'';
  document.getElementById('vWebsite').value=v.website||'';
  document.getElementById('vNotes').value=v.notes||'';
  document.getElementById('vendorDeleteBtn').style.display='';
  openModal('vendorModal');
}

function saveVendor(){
  const name=document.getElementById('vName').value.trim();
  if(!name){alert('Vendor name is required.');return;}
  const id=document.getElementById('vendorModalId').value;
  if(id){
    const v=getVendor(id);
    if(v){v.name=name;v.contact=document.getElementById('vContact').value.trim();v.website=document.getElementById('vWebsite').value.trim();v.notes=document.getElementById('vNotes').value.trim();}
  } else {
    vendors.push({id:uid(),name,contact:document.getElementById('vContact').value.trim(),website:document.getElementById('vWebsite').value.trim(),notes:document.getElementById('vNotes').value.trim(),items:[]});
    activeVendorId=vendors[vendors.length-1].id;
  }
  save();
  closeModal('vendorModal');
  renderSidebar();
  renderSeasonChips();
  renderTable();
  showToast('✓ Vendor saved');
}

function deleteVendor(){
  const id=document.getElementById('vendorModalId').value;
  if(!id)return;
  const v=getVendor(id);
  if(!v)return;
  if(!confirm(`Delete vendor "${v.name}" and all ${v.items.length} items? This cannot be undone.`))return;
  vendors=vendors.filter(x=>x.id!==id);
  activeVendorId=vendors.length?vendors[0].id:'all';
  save();
  closeModal('vendorModal');
  renderSidebar();
  renderSeasonChips();
  renderTable();
  showToast('Vendor deleted');
}

/* ══════════════════════════════════════════
   ITEM MODAL
══════════════════════════════════════════ */
function openAddItem(){
  if(activeVendorId==='all')return;
  const v=getVendor(activeVendorId);if(!v)return;
  document.getElementById('itemModalTitle').textContent='Add Item — '+v.name;
  document.getElementById('itemModalVendorId').value=activeVendorId;
  document.getElementById('itemModalItemId').value='';
  ['iStyleNo','iSeason','iColors','iSizes','iPrice','iMaterial','iLink','iNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iMoq').value='0';
  populateVendorSelect(activeVendorId);
  document.getElementById('itemDeleteBtn').style.display='none';
  openModal('itemModal');
  setTimeout(()=>document.getElementById('iStyleNo').focus(),80);
}

function openEditItem(vendorId, itemId){
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  document.getElementById('itemModalTitle').textContent='Edit Item';
  document.getElementById('itemModalVendorId').value=vendorId;
  document.getElementById('itemModalItemId').value=itemId;
  document.getElementById('iStyleNo').value=it.styleNo||'';
  document.getElementById('iSeason').value=it.season||'';
  document.getElementById('iColors').value=it.colors||'';
  document.getElementById('iSizes').value=it.sizes||'';
  document.getElementById('iPrice').value=it.price||'';
  document.getElementById('iMoq').value=it.moq||0;
  document.getElementById('iMaterial').value=it.material||'';
  document.getElementById('iLink').value=it.link||'';
  document.getElementById('iNotes').value=it.notes||'';
  populateVendorSelect(vendorId);
  document.getElementById('itemDeleteBtn').style.display='';
  openModal('itemModal');
}

function populateVendorSelect(selectedId){
  const sel=document.getElementById('iVendorSelect');
  sel.innerHTML=vendors.map(v=>`<option value="${v.id}"${v.id===selectedId?' selected':''}>${esc(v.name)}</option>`).join('');
}

function saveItem(){
  const styleNo=document.getElementById('iStyleNo').value.trim();
  if(!styleNo){alert('Style number is required.');return;}
  const vendorId=document.getElementById('iVendorSelect').value;
  const itemId=document.getElementById('itemModalItemId').value;
  const origVendorId=document.getElementById('itemModalVendorId').value;

  const itemData={
    styleNo,
    season:document.getElementById('iSeason').value.trim(),
    colors:document.getElementById('iColors').value.trim(),
    sizes:document.getElementById('iSizes').value.trim(),
    price:document.getElementById('iPrice').value.trim(),
    moq:parseInt(document.getElementById('iMoq').value)||0,
    material:document.getElementById('iMaterial').value.trim(),
    link:document.getElementById('iLink').value.trim(),
    notes:document.getElementById('iNotes').value.trim(),
  };

  if(itemId){
    // Edit — possibly moving vendor
    const origV=getVendor(origVendorId);
    if(origV){
      const idx=origV.items.findIndex(i=>i.id===itemId);
      if(idx>=0){
        if(vendorId===origVendorId){
          origV.items[idx]={...origV.items[idx],...itemData};
        } else {
          // Move to new vendor
          const movedItem={...origV.items[idx],...itemData};
          origV.items.splice(idx,1);
          const newV=getVendor(vendorId);
          if(newV)newV.items.push(movedItem);
        }
      }
    }
  } else {
    const v=getVendor(vendorId);
    if(v)v.items.push({id:uid(),...itemData,hidden:false,qtyOrdered:0});
  }

  save();
  closeModal('itemModal');
  renderSidebar();
  renderSeasonChips();
  renderTable();
  showToast('✓ Item saved');
}

function deleteItem(){
  const vendorId=document.getElementById('itemModalVendorId').value;
  const itemId=document.getElementById('itemModalItemId').value;
  if(!vendorId||!itemId)return;
  const v=getVendor(vendorId);if(!v)return;
  const it=v.items.find(i=>i.id===itemId);if(!it)return;
  if(!confirm(`Delete item "${it.styleNo}"?`))return;
  v.items=v.items.filter(i=>i.id!==itemId);
  save();
  closeModal('itemModal');
  renderSidebar();
  renderSeasonChips();
  renderTable();
  showToast('Item deleted');
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function setActiveVendor(id){
  activeVendorId=id;
  renderSidebar();
  renderTable();
}

/* ══════════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════════ */
function exportData(){
  const blob=new Blob([JSON.stringify({vendors},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='littlebasics-vendors-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.vendors&&Array.isArray(data.vendors)){
        if(vendors.length&&!confirm('This will replace your current vendor data. Continue?'))return;
        vendors=data.vendors;
        save();
        activeVendorId=vendors.length?vendors[0].id:'all';
        renderSidebar();
        renderSeasonChips();
        renderTable();
        showToast('✓ Data imported');
      } else alert('Invalid file format.');
    }catch{alert('Could not parse JSON file.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ══════════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════════ */
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// Close on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
// Close on Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-backdrop.open').forEach(el=>el.classList.remove('open'));
});

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let _toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
renderSidebar();
renderSeasonChips();
renderTable();
</script>
